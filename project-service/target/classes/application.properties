server.port=8082
spring.application.name=project-service

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:h2:mem:projects
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Contract service URL: use http://contract-service with Eureka, or http://localhost:8084 without
contract.service.url=${CONTRACT_SERVICE_URL:http://contract-service}
