<div class="flex min-h-screen flex-col bg-slate-50">
  <!-- Header -->
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/95 backdrop-blur">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center gap-2">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-indigo-600 text-white">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
        </div>
        <span class="text-xl font-bold text-slate-900">FreelanceHub</span>
      </a>
      <nav class="flex items-center gap-6">
        <a routerLink="/" routerLinkActive="text-indigo-600" [routerLinkActiveOptions]="{exact:true}"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          Home
        </a>
        <a routerLink="/projects" routerLinkActive="text-indigo-600"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          Find Projects
        </a>
        <a routerLink="/applications" routerLinkActive="text-indigo-600"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          My Applications
        </a>
        <a routerLink="/contracts" routerLinkActive="text-indigo-600"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          My Contracts
        </a>
        @if (auth.isAuthenticated()) {
          @if (auth.isAdmin()) {
            <a routerLink="/admin" class="text-sm font-medium text-slate-600 transition hover:text-slate-900">Admin</a>
          }
          <span class="text-sm text-slate-500">{{ auth.user()?.name }}</span>
          <button (click)="auth.logout()" class="text-sm font-medium text-slate-600 transition hover:text-slate-900">Logout</button>
        } @else {
          <a routerLink="/login" class="text-sm font-medium text-indigo-600 transition hover:text-slate-900">Login</a>
        }
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer -->
  <footer class="border-t border-slate-200 bg-white py-12">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col items-center justify-between gap-6 sm:flex-row">
        <div class="flex items-center gap-2">
          <div class="h-8 w-8 rounded-lg bg-indigo-600"></div>
          <span class="font-semibold text-slate-900">FreelanceHub</span>
        </div>
        <p class="text-sm text-slate-500">Connect with clients. Build your freelance career.</p>
        <div class="flex gap-6 text-sm text-slate-500">
          <a routerLink="/projects" class="hover:text-slate-700">Projects</a>
        </div>
      </div>
    </div>
  </footer>
</div>
