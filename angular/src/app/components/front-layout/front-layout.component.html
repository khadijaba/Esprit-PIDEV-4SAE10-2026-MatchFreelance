<div class="flex min-h-screen flex-col bg-[var(--fiverr-gray-light)]">
  <!-- Header (Fiverr-style) -->
  <header class="sticky top-0 z-40 border-b border-gray-200 bg-white">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a routerLink="/" class="flex items-center shrink-0">
        <span class="flex h-14 w-[200px] max-w-[90vw] items-center justify-center overflow-visible">
          <img src="/logo.png" alt="MatchFreelance" class="h-full w-full object-contain object-left" />
        </span>
      </a>
      <nav class="flex items-center gap-1 sm:gap-4">
        <a
          routerLink="/"
          routerLinkActive="text-fiverr-green"
          [routerLinkActiveOptions]="{ exact: true }"
          class="rounded px-3 py-2 text-sm font-medium text-[var(--fiverr-dark)] transition hover:text-[var(--fiverr-green)]"
        >
          Accueil
        </a>
        <a
          routerLink="/projects"
          routerLinkActive="text-fiverr-green"
          class="rounded px-3 py-2 text-sm font-medium text-[var(--fiverr-dark)] transition hover:text-[var(--fiverr-green)]"
        >
          Projets
        </a>
        <a
          routerLink="/login"
          routerLinkActive="text-fiverr-green"
          class="rounded px-4 py-2 text-sm font-medium text-[var(--fiverr-dark)] transition hover:text-[var(--fiverr-green)]"
        >
          Connexion
        </a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1">
    <router-outlet />
  </main>

  <!-- Footer (Fiverr-style) -->
  <footer class="border-t border-gray-200 bg-white py-12">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="flex flex-col items-center justify-between gap-6 sm:flex-row">
        <div class="flex items-center shrink-0">
          <img src="/logo.png" alt="MatchFreelance" class="h-10 w-[180px] object-contain object-center" />
        </div>
        <div class="flex gap-6 text-sm font-medium text-[var(--fiverr-gray)]">
          <a routerLink="/projects" class="hover:text-[var(--fiverr-green)]">Projets</a>
        </div>
      </div>
    </div>
  </footer>
</div>
