<div class="create-container">
  <!-- Header matching threads page -->
  <div class="create-header">
    <button class="btn-back" (click)="cancel()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7"/>
      </svg>
    </button>
    <h1>Create Discussion Group</h1>
  </div>

  <div class="create-content">
    <form (ngSubmit)="createGroup()" class="create-form">
      <!-- Error Message -->
      <div class="error-message" *ngIf="error">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
        {{ error }}
      </div>

      <!-- Logo Upload (Drag & Drop) -->
      <div class="form-group">
        <label>Group Logo</label>
        <div 
          class="logo-upload-area"
          [class.dragging]="isDragging"
          [class.has-image]="logoPreview"
          (drop)="onDrop($event)"
          (dragover)="onDragOver($event)"
          (dragleave)="onDragLeave($event)"
          (click)="fileInput.click()"
        >
          <input 
            #fileInput
            type="file" 
            accept="image/*"
            (change)="onFileSelected($event)"
            hidden
          />
          
          <div class="upload-content" *ngIf="!logoPreview">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
            <p class="upload-text">Drag & drop an image or click to browse</p>
            <p class="upload-hint">PNG, JPG up to 5MB</p>
          </div>

          <div class="logo-preview" *ngIf="logoPreview">
            <img [src]="logoPreview" alt="Group logo preview" />
            <button type="button" class="btn-remove-logo" (click)="removeLogo($event)">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>
      </div>

      <!-- Group Name -->
      <div class="form-group">
        <label for="name">Group Name *</label>
        <input 
          type="text" 
          id="name"
          [(ngModel)]="group.name" 
          name="name"
          placeholder="Enter group name"
          class="form-input"
          required
        />
      </div>

      <!-- Topic -->
      <div class="form-group">
        <label for="topic">Topic *</label>
        <select 
          id="topic"
          [(ngModel)]="group.topic" 
          name="topic"
          class="form-select"
        >
          <option *ngFor="let topic of topics" [value]="topic">{{ topic }}</option>
        </select>
      </div>

      <!-- Privacy -->
      <div class="form-group">
        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="group.isPrivate" 
            name="isPrivate"
          />
          <span>Private Group</span>
        </label>
        <small class="form-hint">Private groups require approval to join</small>
      </div>

      <!-- Permissions -->
      <div class="permissions-section">
        <h3>Group Permissions</h3>
        
        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="group.allowMemberInvites" 
            name="allowMemberInvites"
          />
          <span>Allow members to invite others</span>
        </label>

        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="group.allowEmojis" 
            name="allowEmojis"
          />
          <span>Allow emojis</span>
        </label>

        <label class="checkbox-label">
          <input 
            type="checkbox" 
            [(ngModel)]="group.allowGifs" 
            name="allowGifs"
          />
          <span>Allow GIFs</span>
        </label>
      </div>

      <!-- Actions -->
      <div class="form-actions">
        <button type="button" class="btn-cancel" (click)="cancel()" [disabled]="creating">
          Cancel
        </button>
        <button type="submit" class="btn-create" [disabled]="creating || uploading">
          <svg *ngIf="creating || uploading" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spinner">
            <circle cx="12" cy="12" r="10"></circle>
          </svg>
          <svg *ngIf="!creating && !uploading" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          {{ creating || uploading ? 'Creating...' : 'Create Group' }}
        </button>
      </div>
    </form>
  </div>
</div>
