<div class="flex min-h-screen items-center justify-center bg-slate-50 px-4">
  <div class="w-full max-w-md rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <h1 class="mb-1 text-xl font-semibold text-slate-900">Sign in</h1>

    <form (ngSubmit)="submit()" class="space-y-3">
      <div>
        <label class="mb-1 block text-xs font-medium text-slate-600">Email</label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
          placeholder="you@example.com"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-medium text-slate-600">Password</label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          class="w-full rounded-md border border-slate-300 px-3 py-2 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
          placeholder="••••••••"
        />
      </div>
      <button
        type="submit"
        [disabled]="loading"
        class="mt-2 inline-flex w-full items-center justify-center rounded-md bg-teal-600 px-3 py-2 text-sm font-medium text-white hover:bg-teal-700 disabled:opacity-60"
      >
        Sign in
      </button>
    </form>
  </div>
</div>
