<div class="flex min-h-screen flex-col bg-[var(--fiverr-gray-light)]">
  <!-- Header -->
  <header class="sticky top-0 z-40 border-b border-gray-200 bg-white shadow-sm">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between gap-4 px-4 sm:px-6 lg:px-8">
      <a routerLink="/freelancer" class="flex shrink-0 items-center gap-3">
        <span class="flex h-9 w-9 items-center justify-center sm:h-10 sm:w-[140px]">
          <img src="/logo.png" alt="MatchFreelance" class="h-full w-full object-contain object-left" />
        </span>
        <span class="hidden border-l border-gray-200 pl-3 text-sm font-medium text-[var(--fiverr-gray)] sm:block">
          Espace Freelancer
        </span>
      </a>

      <nav class="flex items-center gap-1 sm:gap-0.5">
        <a
          routerLink="projects"
          routerLinkActive="!text-[var(--fiverr-green)] !bg-[var(--fiverr-green-light)]"
          class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--fiverr-dark)] transition hover:bg-[var(--fiverr-gray-light)] hover:text-[var(--fiverr-green)]"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          </svg>
          <span class="hidden lg:inline">Projets</span>
        </a>
        <a
          routerLink="availability"
          routerLinkActive="!text-[var(--fiverr-green)] !bg-[var(--fiverr-green-light)]"
          class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--fiverr-dark)] transition hover:bg-[var(--fiverr-gray-light)] hover:text-[var(--fiverr-green)]"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
          </svg>
          <span class="hidden lg:inline">Disponibilités</span>
        </a>
        <a
          routerLink="interviews"
          routerLinkActive="!text-[var(--fiverr-green)] !bg-[var(--fiverr-green-light)]"
          class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--fiverr-dark)] transition hover:bg-[var(--fiverr-gray-light)] hover:text-[var(--fiverr-green)]"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
          </svg>
          <span class="hidden lg:inline">Entretiens</span>
        </a>
        <a
          routerLink="productivity"
          routerLinkActive="!text-[var(--fiverr-green)] !bg-[var(--fiverr-green-light)]"
          class="flex items-center gap-2 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--fiverr-dark)] transition hover:bg-[var(--fiverr-gray-light)] hover:text-[var(--fiverr-green)]"
        >
          <svg class="h-4 w-4 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 17v-6m3 6V7m3 10v-4m3 8H6a2 2 0 01-2-2V5a2 2 0 012-2h8l6 6v10a2 2 0 01-2 2z" />
          </svg>
          <span class="hidden lg:inline">Productivite</span>
        </a>
      </nav>

      <div class="flex shrink-0 items-center gap-2 sm:gap-3">
        <app-notification-menu [userId]="auth.currentUser()?.id ?? 0"></app-notification-menu>
        @if (auth.currentUser(); as user) {
          <span class="hidden max-w-[120px] truncate text-xs text-[var(--fiverr-gray)] sm:block" [title]="user.email">
            {{ user.email }}
          </span>
          <button
            type="button"
            (click)="logout()"
            class="rounded-lg border border-gray-300 px-3 py-2 text-sm font-medium text-[var(--fiverr-dark)] transition hover:bg-gray-50"
          >
            Déconnexion
          </button>
        }
      </div>
    </div>
  </header>

  <main class="flex-1">
    <div class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <router-outlet />
    </div>
  </main>
</div>
