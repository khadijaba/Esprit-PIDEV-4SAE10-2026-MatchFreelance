@if (show) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/50 p-4">
    <div class="w-full max-w-2xl rounded-xl bg-white p-6 shadow-2xl">
      <h2 class="text-xl font-bold text-slate-900">Sign Contract PDF</h2>
      <p class="mt-2 text-sm text-slate-600">
        Please draw your signature below using your mouse or touchscreen.
      </p>

      <div class="mt-6">
        <div class="relative rounded-lg border-2 border-slate-300 bg-white">
          <canvas
            #signatureCanvas
            class="w-full cursor-crosshair touch-none"
            style="height: 200px;"
          ></canvas>
          <div class="absolute bottom-2 right-2">
            <button
              type="button"
              (click)="clearCanvas()"
              class="rounded-lg bg-slate-100 px-3 py-1 text-xs font-medium text-slate-700 hover:bg-slate-200"
            >
              Clear
            </button>
          </div>
        </div>
        <p class="mt-2 text-xs text-slate-500">
          Sign above with your mouse or finger
        </p>
      </div>

      <div class="mt-6 flex justify-end gap-3">
        <button
          type="button"
          (click)="onCancel()"
          class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
        >
          Cancel
        </button>
        <button
          type="button"
          (click)="onSign()"
          [disabled]="!hasSignature"
          class="rounded-lg bg-teal-600 px-4 py-2 text-sm font-medium text-white hover:bg-teal-700 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Sign & Download
        </button>
      </div>
    </div>
  </div>
}
