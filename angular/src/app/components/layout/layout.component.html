<div class="backoffice-dark flex h-screen bg-[var(--bo-main)]">
  <!-- Mobile overlay -->
  @if (sidebarOpen) {
    <div
      (click)="toggleSidebar()"
      class="fixed inset-0 z-20 bg-black/60 lg:hidden"
      aria-hidden="true"
    ></div>
  }
  <!-- Sidebar -->
  <aside
    class="fixed inset-y-0 left-0 z-30 flex w-64 flex-col border-r border-[var(--bo-border)] bg-[var(--bo-sidebar)] shadow-xl transition-transform duration-300 lg:shadow-none"
    [class.-translate-x-full]="!sidebarOpen"
  >
    <!-- Logo -->
    <div class="flex h-16 items-center gap-3 border-b border-[var(--bo-border)] px-4">
      <span class="flex h-9 w-[120px] items-center justify-center">
        <img src="/logo.png" alt="MatchFreelance" class="h-full w-full object-contain object-left opacity-90" />
      </span>
      <span class="text-sm font-semibold text-[var(--bo-muted)]">Back Office</span>
    </div>

    <!-- Nav -->
    <nav class="mt-4 flex-1 space-y-0.5 px-3">
      <a routerLink="dashboard" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1z" />
        </svg>
        Dashboard
      </a>
      <a routerLink="projects" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v10a2 2 0 002 2h8a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
        Projets
      </a>
      <a routerLink="projects/new" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]" [routerLinkActiveOptions]="{exact:true}"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
        Nouveau projet
      </a>
      <a routerLink="candidatures" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        Candidatures
      </a>
      <a routerLink="interviews" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.276A1 1 0 0121 8.618v6.764a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
        Entretiens
      </a>
      <a routerLink="contracts" routerLinkActive="!bg-[var(--bo-accent-soft)] !text-[var(--bo-accent)]"
        class="flex items-center gap-3 rounded-lg px-3 py-2.5 text-sm font-medium text-[var(--bo-text)] transition hover:bg-[var(--bo-hover)]">
        <svg class="h-5 w-5 shrink-0 text-[var(--bo-muted)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        Contrats
      </a>
    </nav>

    <div class="border-t border-[var(--bo-border)] px-4 py-3">
      <p class="text-xs text-[var(--bo-muted)]">MatchFreelance · Admin</p>
    </div>
  </aside>

  <!-- Main content -->
  <div class="flex min-w-0 flex-1 flex-col transition-all duration-300" [class.lg:ml-64]="sidebarOpen">
    <header class="flex h-16 shrink-0 items-center gap-4 border-b border-[var(--bo-border)] bg-[var(--bo-sidebar)] px-6 shadow-sm">
      <button (click)="toggleSidebar()" class="rounded-lg p-2 text-[var(--bo-muted)] transition hover:bg-[var(--bo-hover)] hover:text-[var(--bo-text)]">
        <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <h1 class="text-lg font-semibold text-[var(--bo-text)]">Back Office · MatchFreelance</h1>
    </header>

    <main class="flex-1 overflow-y-auto bg-[var(--bo-main)] p-6">
      <router-outlet />
    </main>
  </div>
</div>
