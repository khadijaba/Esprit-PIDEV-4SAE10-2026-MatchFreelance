<div class="min-h-screen bg-slate-50 py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="mb-8 flex items-center justify-between">
            <div>
                <h1 class="text-3xl font-bold text-slate-900">Profile Settings</h1>
                <p class="mt-2 text-sm text-slate-600">Update your personal information and profile picture.</p>
            </div>
        </div>

        @if (loading) {
        <div
            class="flex flex-col items-center justify-center h-64 bg-white rounded-2xl shadow-sm border border-slate-200">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-indigo-600 border-t-transparent"></div>
            <p class="mt-4 text-slate-500 font-medium">Loading your profile...</p>
        </div>
        } @else {
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Left: Avatar & Summary -->
            <div class="lg:col-span-1">
                <div
                    class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 flex flex-col items-center text-center">
                    <div class="relative mb-6">
                        <app-avatar-upload mode="upload" (avatarUpdated)="onAvatarUpdated($event)"
                            class="transform scale-[2.5] block m-12"></app-avatar-upload>
                    </div>
                    <h2 class="text-xl font-bold text-slate-900 mt-8">{{ user?.firstName }} {{ user?.lastName }}</h2>
                    <p class="text-indigo-600 font-semibold text-sm uppercase tracking-wider mt-1">{{ user?.role }}</p>
                    <div class="mt-6 w-full border-t border-slate-100 pt-6 space-y-3">
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-500">Member since</span>
                            <span class="text-slate-900 font-medium">April 2026</span>
                        </div>
                        <div class="flex justify-between text-sm">
                            <span class="text-slate-500">Email Status</span>
                            <span class="text-emerald-500 font-bold flex items-center">
                                <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                    <path
                                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z">
                                    </path>
                                </svg>
                                Verified
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right: Form -->
            <div class="lg:col-span-2">
                <form [formGroup]="profileForm" (ngSubmit)="onSubmit()"
                    class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-8 space-y-6">
                        <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                            <div>
                                <label for="firstName" class="block text-sm font-medium text-slate-700">First
                                    name</label>
                                <div class="mt-1">
                                    <input type="text" id="firstName" formControlName="firstName"
                                        class="block w-full rounded-xl border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-2.5 transition-all">
                                </div>
                            </div>

                            <div>
                                <label for="lastName" class="block text-sm font-medium text-slate-700">Last name</label>
                                <div class="mt-1">
                                    <input type="text" id="lastName" formControlName="lastName"
                                        class="block w-full rounded-xl border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-2.5 transition-all">
                                </div>
                            </div>

                            <div class="sm:col-span-2">
                                <label for="email" class="block text-sm font-medium text-slate-700">Email
                                    (Read-only)</label>
                                <div class="mt-1">
                                    <input type="email" id="email" formControlName="email"
                                        class="block w-full rounded-xl border-slate-200 bg-slate-50 text-slate-500 shadow-sm sm:text-sm py-2.5 cursor-not-allowed">
                                </div>
                            </div>

                            <div class="sm:col-span-2">
                                <label for="address" class="block text-sm font-medium text-slate-700">Address</label>
                                <div class="mt-1">
                                    <input type="text" id="address" formControlName="address"
                                        class="block w-full rounded-xl border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-2.5 transition-all">
                                </div>
                            </div>

                            <div>
                                <label for="birthDate" class="block text-sm font-medium text-slate-700">Date of
                                    Birth</label>
                                <div class="mt-1">
                                    <input type="date" id="birthDate" formControlName="birthDate"
                                        class="block w-full rounded-xl border-slate-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm py-2.5 transition-all">
                                </div>
                            </div>

                            <div>
                                <label for="role" class="block text-sm font-medium text-slate-700">Role</label>
                                <div class="mt-1">
                                    <input type="text" id="role" formControlName="role"
                                        class="block w-full rounded-xl border-slate-200 bg-slate-50 text-slate-500 shadow-sm sm:text-sm py-2.5 cursor-not-allowed uppercase">
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-slate-50 px-8 py-4 flex items-center justify-end border-t border-slate-200">
                        <button type="submit" [disabled]="saving"
                            class="inline-flex justify-center py-2.5 px-6 border border-transparent shadow-sm text-sm font-bold rounded-xl text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all disabled:opacity-50">
                            @if (saving) {
                            <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor"
                                    d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                                </path>
                            </svg>
                            Saving Changes...
                            } @else {
                            Save Profile
                            }
                        </button>
                    </div>
                </form>
            </div>
        </div>
        }
    </div>
</div>
