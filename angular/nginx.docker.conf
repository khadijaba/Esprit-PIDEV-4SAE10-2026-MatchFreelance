server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # After `docker compose build frontend`, browsers often keep old hashed *.js lazy chunks.
    # These headers make clients revalidate so your Angular edits actually show up on :4200.
    location ~* \.(js|mjs|css|map)$ {
        add_header Cache-Control "no-cache, must-revalidate";
    }
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    location /api/ {
        proxy_pass http://api-gateway:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
