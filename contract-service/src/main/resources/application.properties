server.port=8084
spring.application.name=contract-service

spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.profiles.active=mysql

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- Contract AI Configuration ---
# You can enable Gemini (API), Claude (API), or Ollama (local)
# Priority: Gemini > Claude > Ollama

# Ollama (local LLM) - Requires Ollama running
# Docker: use base-url=http://host.docker.internal:11434
contract.ai.ollama.enabled=true
contract.ai.ollama.base-url=http://localhost:11434
contract.ai.ollama.model=llama3.2:1b
contract.ai.ollama.max-messages=40
contract.ai.ollama.max-chars-per-message=800
contract.ai.ollama.read-timeout-seconds=120
contract.ai.ollama.connect-timeout-seconds=10

# Claude API - Requires API key (use environment variable CLAUDE_API_KEY)
contract.ai.claude.enabled=false
contract.ai.claude.base-url=https://api.anthropic.com
contract.ai.claude.api-key=your-claude-api-key-here
contract.ai.claude.model=claude-3-haiku-20240307
contract.ai.claude.version=2023-06-01
contract.ai.claude.max-tokens=4096
contract.ai.claude.read-timeout-seconds=120
contract.ai.claude.connect-timeout-seconds=10

# Gemini API - Requires API key
contract.ai.gemini.enabled=false
contract.ai.gemini.base-url=https://generativelanguage.googleapis.com
contract.ai.gemini.api-key=your-gemini-api-key-here
contract.ai.gemini.model=gemini-1.5-flash
contract.ai.gemini.max-tokens=8192
contract.ai.gemini.read-timeout-seconds=120
contract.ai.gemini.connect-timeout-seconds=10
