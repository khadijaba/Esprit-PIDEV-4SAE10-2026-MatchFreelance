# MySQL configuration - use with: spring.profiles.active=mysql
#
# Contract AI (Ollama): when this service runs inside Docker and Ollama runs on the host (Windows/Mac),
# override in env or config server, e.g. CONTRACT_AI_OLLAMA_BASE_URL=http://host.docker.internal:11434
# and CONTRACT_AI_OLLAMA_ENABLED=true
#
spring.datasource.url=jdbc:mysql://localhost:3306/freelancing_contracts?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
