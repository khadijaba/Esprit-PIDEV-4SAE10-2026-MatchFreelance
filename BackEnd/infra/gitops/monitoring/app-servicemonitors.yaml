apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: skill-monitor
  namespace: monitoring
  labels:
    release: kube-prom
spec:
  namespaceSelector:
    matchNames: ["default"]
  selector:
    matchLabels:
      app: skill
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: project-monitor
  namespace: monitoring
  labels:
    release: kube-prom
spec:
  namespaceSelector:
    matchNames: ["default"]
  selector:
    matchLabels:
      app: project
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
