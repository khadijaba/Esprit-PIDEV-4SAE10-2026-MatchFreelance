apiVersion: apps/v1
kind: Deployment
metadata:
  name: skill
  labels:
    app: skill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: skill
  template:
    metadata:
      labels:
        app: skill
    spec:
      containers:
        - name: skill
          image: docker.io/emna450/backend-skill:10
          imagePullPolicy: Always
          ports:
            - containerPort: 8083
---
apiVersion: v1
kind: Service
metadata:
  name: skill
  labels:
    app: skill
spec:
  selector:
    app: skill
  ports:
    - name: http
      port: 8083
      targetPort: 8083
