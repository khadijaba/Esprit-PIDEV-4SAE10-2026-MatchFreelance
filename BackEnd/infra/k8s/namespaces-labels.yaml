# Namespaces métier + labels communs (app.kubernetes.io, env, team).
# Appliquer une fois par cluster ou via Argo CD : kubectl apply -f BackEnd/infra/k8s/namespaces-labels.yaml
---
apiVersion: v1
kind: Namespace
metadata:
  name: mysql
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: gitops
    env: dev
    team: platform
---
