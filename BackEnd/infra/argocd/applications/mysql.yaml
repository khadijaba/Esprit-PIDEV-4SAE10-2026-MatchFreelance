# MySQL central (namespace mysql). Dossier Git = uniquement ce manifeste.
# Remplacer spec.source.repoURL et targetRevision par votre dépôt / branche.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql
  namespace: argocd
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: platform
    app.kubernetes.io/managed-by: argocd
    team: platform
    env: dev
  annotations:
    argocd.argoproj.io/manifest-generate-timeout: 600s
spec:
  project: default
  source:
    repoURL: https://github.com/khadijaba/Esprit-PIDEV-4SAE10-2026-MatchFreelance.git
    targetRevision: projectskills
    path: BackEnd/infra/k8s/mysql
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
