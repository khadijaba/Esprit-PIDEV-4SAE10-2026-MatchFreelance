apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-project
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/name: grafana-dashboard-project
    app.kubernetes.io/part-of: matchfreelance
    team: backend
    env: dev
data:
  project-dashboard.json: |
    {
      "annotations": {
