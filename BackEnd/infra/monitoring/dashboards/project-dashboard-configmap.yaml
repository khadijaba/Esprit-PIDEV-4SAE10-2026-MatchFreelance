            "textMode": "auto"
          },
          "pluginVersion": "11.1.0",
          "targets": [
            {
              "editorMode": "code",
              "expr": "kube_deployment_status_replicas_available{namespace=\"project\",deployment=\"project-ms\"}",
              "legendFormat": "available",
              "range": true,
              "refId": "A"
            }
          ],
          "title": "Project Available Replicas",
          "type": "stat"
        },
        {
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
