# kube-prometheus-stack — profil « petite VM / mono-nœud »
# Utilisé par Argo CD en multi-source (chart Helm + ce fichier depuis Git).
# Ajuster nodePorts si collision avec d’autres services sur le cluster.

defaultRules:
  create: false

alertmanager:
  enabled: false

grafana:
  enabled: true
  adminPassword: changeme
  service:
    type: NodePort
    nodePort: 30080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 384Mi

prometheus:
  enabled: true
  service:
    type: NodePort
    nodePort: 30090
  prometheusSpec:
    retention: 24h
    scrapeInterval: 60s
    evaluationInterval: 60s
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1536Mi
    storageSpec: {}

prometheusOperator:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 384Mi

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

nodeExporter:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

kubeApiServer:
  enabled: true

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeEtcd:
  enabled: false
