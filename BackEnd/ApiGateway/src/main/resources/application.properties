# Nom Eureka : doit correspondre aux routes lb://... de la Gateway
spring.application.name=ApiGateway
server.port=8086

# Config Server (IntelliJ : localhost ; Docker : CONFIG_SERVER_HOST=config-server)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Service Python Team IA (FastAPI). Démarrage : TeamAi/ → uvicorn app.main:app --port 5000
team.ai.url=http://127.0.0.1:5000
