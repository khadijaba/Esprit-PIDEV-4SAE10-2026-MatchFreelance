# ========== API GATEWAY ==========
spring.application.name=ApiGateway
# Port de l'API Gateway (frontend proxy → 8086)
server.port=8086

# Config Server (charge la config depuis le serveur au démarrage)
spring.config.import=optional:configserver:http://localhost:8888

# Eureka : même URL que les microservices (pour toute l'équipe)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Routes definies en Java (ApiGatewayApplication.gatewayRoutes)
# User : URL directe (évite 503 si Eureka enregistre une adresse inaccessible)
user.service.uri=http://localhost:8085

# Formation (si pas dans Eureka, décommenter et mettre le port du microservice Formation)
# formation.service.uri=http://localhost:8087

# Upload de fichiers (CV) : augmenter la taille du buffer pour multipart
spring.codec.max-in-memory-size=10MB


