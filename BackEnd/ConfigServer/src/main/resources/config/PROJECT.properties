# Microservice PROJECT (spring.application.name=PROJECT)
spring.application.name=PROJECT
server.port=8084

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
spring.datasource.url=jdbc:mysql://localhost:3306/project?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Au démarrage : ALTER TABLE project MODIFY status en VARCHAR (MySQL) pour accepter DRAFT si l'ancien schéma était ENUM.
app.db.ensure-status-varchar=true

management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true

# Swagger / OpenAPI (springdoc)
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.packages-to-scan=esprit.project
