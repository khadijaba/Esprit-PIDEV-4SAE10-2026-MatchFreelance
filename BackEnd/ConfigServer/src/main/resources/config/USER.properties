# Microservice USER (spring.application.name=USER)
spring.application.name=USER
server.port=8085

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Flyway : bases déjà créées sans toutes les colonnes (ex. birth_date) — baseline + migration Java V1
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT — JwtUtils attend jwt.expiration (ms), pas jwt.expiration-ms
jwt.secret=${JWT_SECRET:MatchFreelanceSecretKeyForJWTTokenGenerationMinimum32Characters}
jwt.expiration=${JWT_EXPIRATION:86400000}
welcome.message=${WELCOME_MESSAGE:Bienvenue dans le microservice USER}

# SendGrid : expéditeur ; clé API = sendgrid.api.key (module User) ou SENDGRID_API_KEY
sendgrid.from.email=${SENDGRID_FROM_EMAIL:aminebej2002@gmail.com}
