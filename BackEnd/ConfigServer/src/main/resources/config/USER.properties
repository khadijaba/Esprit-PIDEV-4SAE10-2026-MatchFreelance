# Microservice USER (spring.application.name=USER)
spring.application.name=USER
server.port=8085

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=false

jwt.secret=MatchFreelanceSecretKeyForJWTTokenGenerationMinimum32Characters
jwt.expiration-ms=86400000
