# Configuration spécifique au microservice USER (spring.application.name=USER)
# Surcharge / complément à application.properties

spring.application.name=USER
server.port=8085

spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

jwt.secret=MatchFreelanceSecretKeyForJWTTokenGenerationMinimum32Characters
jwt.expiration-ms=86400000
