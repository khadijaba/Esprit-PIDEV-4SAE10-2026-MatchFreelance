# Configuration commune chargée pour tous les clients (Spring Cloud Config)
# + fichier spécifique {spring.application.name}.properties

# Eureka (commun)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
# Heartbeats Netflix uniquement (pas /actuator/health) — évite des DOWN erronés en Docker si un indicateur de santé fluctue.
eureka.client.healthcheck.enabled=false

logging.level.org.springframework.cloud.config=INFO
