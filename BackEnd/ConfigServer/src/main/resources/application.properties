# ========== SPRING CLOUD CONFIG SERVER ==========
spring.application.name=configserver
server.port=8888

# Option 1: File Store (dossier local, sans Git) - idéal pour dev
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=file:./config,classpath:/config

