apiVersion: apps/v1
kind: Deployment
metadata:
  name: formation-ms
  namespace: formation
  labels:
    app.kubernetes.io/name: formation-ms
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: matchfreelance
    app.kubernetes.io/version: "0.0.1"
    app: formation-ms
    env: dev
    team: backend
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: formation-ms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: formation-ms
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: matchfreelance
        app.kubernetes.io/version: "0.0.1"
        app: formation-ms
        env: dev
        team: backend
    spec:
      terminationGracePeriodSeconds: 15
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z mysql.mysql.svc.cluster.local 3306; do echo waiting for mysql; sleep 3; done"
      containers:
        - name: formation-ms
          image: emna450/backend-formation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: CONFIG_SERVER_HOST
              value: config-server
            - name: EUREKA_URL
              value: http://eureka:8761/eureka
            - name: MYSQL_HOST
              value: mysql.mysql.svc.cluster.local
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_PASSWORD
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 40
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8081
            initialDelaySeconds: 80
            periodSeconds: 20
