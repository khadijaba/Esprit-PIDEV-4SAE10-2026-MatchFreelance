apiVersion: v1
kind: Secret
metadata:
  name: formation-mysql-secret
  namespace: __NAMESPACE__
type: Opaque
stringData:
  MYSQL_ROOT_PASSWORD: root123
  MYSQL_DATABASE: FormationDB
  MYSQL_USER: formation
  MYSQL_PASSWORD: formation123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-formation
  namespace: __NAMESPACE__
  labels:
    app: mysql-formation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-formation
  template:
    metadata:
      labels:
        app: mysql-formation
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: formation-mysql-secret
                  key: MYSQL_PASSWORD
          readinessProbe:
            tcpSocket:
              port: 3306
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-formation
  namespace: __NAMESPACE__
  labels:
    app: mysql-formation
spec:
  selector:
    app: mysql-formation
  ports:
    - name: mysql
      port: 3306
      targetPort: 3306
  type: ClusterIP
