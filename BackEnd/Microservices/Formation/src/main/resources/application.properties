# Config Server (optionnel). En Docker : CONFIG_SERVER_HOST=config-server
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

# Nom Eureka = FORMATION (pour lb://FORMATION dans la Gateway)
spring.application.name=FORMATION
server.port=8081

# ============================
# EUREKA CLIENT (pour lb://FORMATION depuis la Gateway)
# ============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

# ============================
# DATABASE - MySQL AUTO-CR?ATION (CORRIG?)
# ============================
# CORRECTION : Incluez le nom de la base dans l'URL !
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/FormationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}

# Retirez ces lignes, elles ne sont pas n?cessaires
# spring.jpa.properties.hibernate.default_schema=formation_db
# spring.datasource.hikari.schema=formation_db

# ============================
# JPA - Cr?ation automatique SIMPLIFI?E
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Retirez les lignes redondantes
# spring.jpa.properties.hibernate.hbm2ddl.auto=create-drop
# spring.jpa.properties.jakarta.persistence.schema-generation.database.action=create

# ============================
# ACTUATOR + Prometheus (Grafana)
# ============================
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# ============================
# CONFIGURATION SUPPLEMENTAIRE
# ============================
# Pour ?viter les erreurs de connexion
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false


