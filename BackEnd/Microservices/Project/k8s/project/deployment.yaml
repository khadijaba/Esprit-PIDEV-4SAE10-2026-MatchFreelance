apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-ms
  namespace: project
  labels:
    app.kubernetes.io/name: project-ms
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: matchfreelance
    app.kubernetes.io/version: "0.0.1"
    app: project-ms
    env: dev
    team: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-ms
  template:
    metadata:
      labels:
        app.kubernetes.io/name: project-ms
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: matchfreelance
        app.kubernetes.io/version: "0.0.1"
        app: project-ms
        env: dev
        team: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8084"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.36
          command:
            - sh
            - -c
            - "until nc -z mysql.mysql.svc.cluster.local 3306; do echo waiting for mysql; sleep 3; done"
      containers:
        - name: project-ms
          image: emna450/project:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8084
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql.mysql.svc.cluster.local:3306/projectdb?createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: project-db-credentials
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: project-db-credentials
                  key: password
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "768Mi"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8084
            initialDelaySeconds: 40
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8084
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
