# Jenkins avec docker build/push depuis le pipeline (socket Docker Desktop / Linux).
#
# Depuis PowerShell (dossier jenkins-docker) :
#   docker compose up -d --build
#
# Si tu préfères ne pas lancer Jenkins en root : retirer user: "0:0", ajouter sous ce service :
#   group_add: [ "${DOCKER_GID}" ]
# et dans .env : DOCKER_GID=<sortie de : stat -c '%g' /var/run/docker.sock sur la machine hôte>

services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    image: matchfreelance-jenkins:lts-docker-cli
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "50000:50000"
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    # Évite « permission denied » sur le socket : le user jenkins (1000) n’est pas dans le groupe du socket hôte.
    user: "0:0"

volumes:
  jenkins_home:
