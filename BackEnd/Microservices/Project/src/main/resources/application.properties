# Nom Eureka : doit correspondre à lb://PROJECT dans la Gateway
spring.application.name=PROJECT
server.port=8084

# Config Server (IntelliJ : localhost ; Docker : CONFIG_SERVER_HOST=config-server)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Actuator (health pour Kubernetes, Prometheus pour monitoring)
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
