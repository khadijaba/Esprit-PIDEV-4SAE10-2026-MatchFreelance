apiVersion: v1
kind: Secret
metadata:
  name: skill-mysql-secret
  namespace: __NAMESPACE__
type: Opaque
stringData:
  MYSQL_DATABASE: skilldb
  MYSQL_USER: skill
  MYSQL_PASSWORD: skill123
  MYSQL_ROOT_PASSWORD: root123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql-skill
  namespace: __NAMESPACE__
  labels:
    app: mysql-skill
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql-skill
  template:
    metadata:
      labels:
        app: mysql-skill
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: skill-mysql-secret
                  key: MYSQL_DATABASE
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: skill-mysql-secret
                  key: MYSQL_USER
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skill-mysql-secret
                  key: MYSQL_PASSWORD
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: skill-mysql-secret
                  key: MYSQL_ROOT_PASSWORD
          ports:
            - containerPort: 3306
          args:
            - --innodb-buffer-pool-size=64M
            - --performance-schema=OFF
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-skill
  namespace: __NAMESPACE__
spec:
  selector:
    app: mysql-skill
  ports:
    - port: 3306
      targetPort: 3306
  type: ClusterIP
