# Utilisateur MySQL créé par l'init du serveur central (infra/k8s/mysql/mysql.yaml).
apiVersion: v1
kind: Secret
metadata:
  name: skill-mysql-secret
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: skill-ms
    app.kubernetes.io/component: database-client
    app.kubernetes.io/part-of: matchfreelance
    env: dev
    team: backend
type: Opaque
stringData:
  MYSQL_DATABASE: skill_db
  MYSQL_USER: skill_user
  MYSQL_PASSWORD: skill_pwd
  MYSQL_ROOT_PASSWORD: root
