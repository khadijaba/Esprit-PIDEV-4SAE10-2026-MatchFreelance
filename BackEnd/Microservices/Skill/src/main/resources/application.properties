spring.application.name=Skill
server.port=8083

# connexion eureka
eureka.client.service-url.defaultZone=http://192.168.1.2:8761/eureka/
eureka.instance.prefer-ip-address=true
# base de donnÈes
spring.datasource.url=jdbc:mysql://localhost:3306/skill_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
