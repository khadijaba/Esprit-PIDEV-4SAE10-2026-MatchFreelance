# User microservice - Eureka name must match lb://USER in Gateway
spring.application.name=USER
server.port=8085

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/user?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JWT (use a long secret in production)
jwt.secret=MatchFreelanceSecretKeyForJWTTokenGenerationMinimum32Characters
jwt.expiration-ms=86400000
