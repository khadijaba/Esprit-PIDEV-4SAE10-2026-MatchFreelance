# Config Server (optionnel)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

spring.application.name=EVALUATION
server.port=8083

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/EvaluationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQL_USER:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

spring.jackson.serialization.indent-output=true

# Gateway (API) — utilisé si app.certificat.qr-use-frontend=false pour le QR
app.public.base-url=http://localhost:8050
# Front Angular : pour le QR (scan téléphone). Mettre l'IP de votre PC sur le réseau local, ex. :
# app.frontend.base-url=http://192.168.1.15:4200
# + lancer : ng serve --host 0.0.0.0 --port 4200
app.frontend.base-url=http://localhost:4200
# true = QR ouvre le front /verify-certificat/... (recommandé). false = page HTML sur la Gateway.
app.certificat.qr-use-frontend=true

# Logo du certificat (chemin classpath dans src/main/resources)
# Exemple: src/main/resources/static/logo-matchfreelance.png
certificate.logo.path=/static/logo-matchfreelance.png

# Génération auto : URL du POST Python (evaluation-reports-py), ex. http://localhost:8090/api/evaluation-reports/exam/auto-generate
# Laisser vide pour utiliser uniquement la génération Java intégrée.
app.examen.python-generator-url=${EXAMEN_PYTHON_GENERATOR_URL:}

# LLM (API compatible OpenAI : OpenAI, Azure, Ollama).
# Ollama local (sans clé) : EXAMEN_LLM_ENABLED=true EXAMEN_LLM_BASE_URL=http://127.0.0.1:11434/v1 EXAMEN_LLM_MODEL=llama3.2
# (api-key vide acceptée ; le client envoie le jeton factice « ollama » si l’URL pointe sur :11434 ou contient « ollama »).
app.examen.llm.enabled=${EXAMEN_LLM_ENABLED:false}
app.examen.llm.use-by-default=${EXAMEN_LLM_USE_BY_DEFAULT:false}
app.examen.llm.base-url=${EXAMEN_LLM_BASE_URL:https://api.openai.com/v1}
app.examen.llm.api-key=${EXAMEN_LLM_API_KEY:}
app.examen.llm.model=${EXAMEN_LLM_MODEL:gpt-4o-mini}
app.examen.llm.reject-on-llm-failure=${EXAMEN_LLM_REJECT_ON_FAILURE:true}

# Nombre de questions cible pour un passage en mode examen adaptatif (plancher métier = MIN_QUESTIONS_PAR_EXAMEN)
app.examen.adaptatif.nb-questions=7

# Chronomètre par défaut (secondes) — multiplié côté API si temps majoré (accessibilité)
app.examen.chrono.secondes-par-question=10

