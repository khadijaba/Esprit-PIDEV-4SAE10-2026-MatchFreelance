# Anciennement MySQL in-cluster : les identifiants restent dans le namespace evaluation
# pour l’application ; le serveur MySQL est désormais dans le namespace mysql (DNS mysql.mysql.svc.cluster.local).
apiVersion: v1
kind: Secret
metadata:
  name: evaluation-mysql-secret
  namespace: evaluation
  labels:
    app.kubernetes.io/name: evaluation-ms
    app.kubernetes.io/component: database-client
    app.kubernetes.io/part-of: matchfreelance
    env: dev
    team: backend
type: Opaque
stringData:
  MYSQL_DATABASE: EvaluationDB
  MYSQL_USER: evaluation_user
  MYSQL_PASSWORD: evaluation_pwd
  MYSQL_ROOT_PASSWORD: root
