spring.application.name=Candidature
server.port=8082

# connexion eureka
eureka.client.service-url.defaultZone=http://192.168.1.2:8761/eureka/
eureka.instance.prefer-ip-address=true
# base de donnÈes
spring.datasource.url=jdbc:mysql://localhost:3306/candidature?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect