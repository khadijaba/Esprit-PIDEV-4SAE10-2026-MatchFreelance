# Port 8090 — avoids conflict with candidature (8083) in this monorepo
server.port=8090
spring.application.name=evaluation-service

spring.config.import=optional:configserver:http://localhost:8888
spring.profiles.active=mysql

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.cloud.discovery.enabled=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.jackson.serialization.indent-output=true

# Via API Gateway (8081)
app.public.base-url=http://localhost:8081
app.frontend.base-url=http://localhost:4200
app.certificat.qr-use-frontend=true

certificate.logo.path=/static/logo-matchfreelance.png

server.error.whitelabel.enabled=false
server.error.include-message=always
server.error.include-binding-errors=always

spring.h2.console.enabled=false
