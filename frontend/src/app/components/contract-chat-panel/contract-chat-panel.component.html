<div class="rounded-2xl border-2 border-[#88c9b9] bg-white p-4 shadow-sm">
  <h3 class="text-base font-bold text-slate-800">Chat avec {{ peerName }}</h3>

  <div class="mt-4 overflow-hidden rounded-xl border border-slate-200">
    <div class="border-b border-slate-200 bg-slate-100 px-4 py-2.5 text-sm font-medium text-slate-700">
      Chat avec {{ peerName }}
    </div>

    @if (loading) {
      <div class="flex h-52 items-center justify-center bg-slate-50/80">
        <div class="h-8 w-8 animate-spin rounded-full border-2 border-teal-200 border-t-teal-600"></div>
      </div>
    } @else if (messages.length === 0) {
      <div class="flex h-52 items-center justify-center bg-white px-4 text-center text-sm text-slate-500">
        Pas encore de messages. Démarrez la conversation !
      </div>
    } @else {
      <div class="max-h-64 space-y-3 overflow-y-auto bg-white px-3 py-3">
        @for (m of messages; track m.id) {
          <div class="flex" [class.justify-end]="isMine(m)" [class.justify-start]="!isMine(m)">
            <div
              class="max-w-[85%] rounded-2xl px-3 py-2 text-sm shadow-sm"
              [class.bg-teal-600]="isMine(m)"
              [class.text-white]="isMine(m)"
              [class.bg-slate-100]="!isMine(m)"
              [class.text-slate-800]="!isMine(m)"
            >
              <p class="whitespace-pre-wrap break-words">{{ m.content }}</p>
              <p
                class="mt-1 text-[10px] opacity-80"
                [class.text-teal-100]="isMine(m)"
                [class.text-slate-500]="!isMine(m)"
              >
                {{ formatTime(m.createdAt) }}
              </p>
            </div>
          </div>
        }
      </div>
    }

    <div class="flex gap-2 border-t border-slate-100 bg-slate-50/90 p-3">
      <input
        type="text"
        [(ngModel)]="draft"
        (keydown.enter)="$event.preventDefault(); send()"
        placeholder="Écrire un message…"
        class="min-w-0 flex-1 rounded-xl border border-slate-200 bg-white px-3 py-2.5 text-sm focus:border-teal-500 focus:outline-none focus:ring-1 focus:ring-teal-500"
      />
      <button
        type="button"
        (click)="send()"
        [disabled]="sending || !draft.trim()"
        class="flex h-11 w-11 shrink-0 items-center justify-center rounded-xl bg-[#88c9b9] text-white shadow-sm transition hover:brightness-95 disabled:cursor-not-allowed disabled:opacity-50"
        title="Envoyer"
      >
        @if (sending) {
          <span class="h-4 w-4 animate-spin rounded-full border-2 border-white/40 border-t-white"></span>
        } @else {
          <svg class="h-5 w-5 -translate-x-px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
          </svg>
        }
      </button>
    </div>
  </div>
</div>
