<div class="auth-pidev-bg flex min-h-screen items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-[1.25rem] bg-white p-8 shadow-2xl ring-1 ring-slate-200/80">
    <h1 class="text-2xl font-bold text-slate-900">Nouveau mot de passe</h1>
    <p class="mt-2 text-sm text-slate-600">
      Saisissez l’e-mail du compte, le <strong>code à 6 chiffres</strong> reçu après « Mot de passe oublié », puis votre
      nouveau mot de passe.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      @if (errorMessage) {
        <div class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage }}</div>
      }
      <div>
        <label class="mb-1 block text-xs font-semibold text-slate-600">E-mail</label>
        <input
          type="email"
          formControlName="email"
          placeholder="vous@exemple.com"
          class="auth-pidev-input w-full rounded-xl px-4 py-3.5 placeholder-slate-400"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-semibold text-slate-600">Code à 6 chiffres</label>
        <input
          type="text"
          formControlName="verificationCode"
          inputmode="numeric"
          maxlength="6"
          autocomplete="one-time-code"
          placeholder="000000"
          class="auth-pidev-input w-full rounded-xl px-4 py-3.5 font-mono text-lg tracking-[0.35em] placeholder-slate-400"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-semibold text-slate-600">Nouveau mot de passe</label>
        <input
          type="password"
          formControlName="newPassword"
          autocomplete="new-password"
          class="auth-pidev-input w-full rounded-xl px-4 py-3.5 placeholder-slate-400"
        />
      </div>
      <div>
        <label class="mb-1 block text-xs font-semibold text-slate-600">Confirmer</label>
        <input
          type="password"
          formControlName="confirmPassword"
          autocomplete="new-password"
          class="auth-pidev-input w-full rounded-xl px-4 py-3.5 placeholder-slate-400"
        />
      </div>
      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-xl bg-indigo-600 py-3.5 text-sm font-bold uppercase tracking-wide text-white hover:bg-indigo-700 disabled:opacity-60"
      >
        {{ loading ? 'Enregistrement…' : 'Enregistrer le mot de passe' }}
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-slate-500">
      <a routerLink="/forgot-password" class="font-semibold text-indigo-600 hover:text-indigo-700">← Demander un code</a>
      ·
      <a routerLink="/login" class="font-semibold text-indigo-600 hover:text-indigo-700">Connexion</a>
    </p>
  </div>
</div>
