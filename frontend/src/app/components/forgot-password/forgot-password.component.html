<div class="auth-pidev-bg flex min-h-screen items-center justify-center px-4 py-10">
  <div class="w-full max-w-md rounded-[1.25rem] bg-white p-8 shadow-2xl ring-1 ring-slate-200/80">
    <h1 class="text-2xl font-bold text-slate-900">Mot de passe oublié</h1>
    <p class="mt-2 text-sm text-slate-600">
      Si l’adresse existe, un <strong>code à 6 chiffres</strong> est envoyé par e-mail. Ensuite ouvrez
      <a routerLink="/reset-password" class="font-semibold text-indigo-600 underline">Nouveau mot de passe</a>
      pour saisir le code et choisir un nouveau mot de passe.
    </p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="mt-6 space-y-4">
      @if (errorMessage) {
        <div class="rounded-xl bg-red-50 px-4 py-3 text-sm text-red-700">{{ errorMessage }}</div>
      }
      @if (successMessage) {
        <div class="rounded-xl bg-emerald-50 px-4 py-3 text-sm text-emerald-800">{{ successMessage }}</div>
      }
      <input
        type="email"
        formControlName="email"
        placeholder="Email"
        class="auth-pidev-input w-full rounded-xl px-4 py-3.5 placeholder-slate-400"
      />
      <button
        type="submit"
        [disabled]="loading"
        class="w-full rounded-xl bg-indigo-600 py-3.5 text-sm font-bold uppercase tracking-wide text-white hover:bg-indigo-700 disabled:opacity-60"
      >
        {{ loading ? 'Envoi…' : 'Envoyer le code' }}
      </button>
    </form>
    <p class="mt-6 text-center text-sm text-slate-500">
      <a routerLink="/login" class="font-semibold text-indigo-600 hover:text-indigo-700">← Connexion</a>
    </p>
  </div>
</div>
