<div class="mx-auto max-w-2xl space-y-6">
  <div class="flex items-center gap-3">
    <a routerLink="/admin/sponsors" class="rounded-lg p-2 text-gray-400 hover:bg-gray-100 hover:text-gray-600">
      <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
    </a>
    <h2 class="text-2xl font-bold text-gray-800">{{ isEdit ? 'Edit' : 'New' }} Sponsor</h2>
  </div>

  <div class="rounded-xl border border-gray-200 bg-white p-6 shadow-sm">
    <div class="space-y-5">
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Name *</label>
          <input type="text" [(ngModel)]="form.name" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="Sponsor name">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
          <select [(ngModel)]="form.type" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500">
            <option value="COMPANY">Company</option>
            <option value="INDIVIDUAL">Individual</option>
            <option value="ORGANIZATION">Organization</option>
            <option value="STARTUP">Startup</option>
          </select>
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
        <textarea [(ngModel)]="form.description" rows="3" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="About this sponsor..."></textarea>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email" [(ngModel)]="form.email" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="sponsor@example.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Phone</label>
          <input type="tel" [(ngModel)]="form.phone" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="+216 XX XXX XXX">
        </div>
      </div>

      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Website</label>
          <input type="url" [(ngModel)]="form.website" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="https://sponsor.com">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Total Budget ($)</label>
          <input type="number" [(ngModel)]="form.totalBudget" class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500" placeholder="0">
        </div>
      </div>
    </div>

    <div class="mt-6 flex justify-end gap-3 border-t border-gray-100 pt-6">
      <a routerLink="/admin/sponsors" class="rounded-lg border border-gray-300 px-4 py-2.5 text-sm font-medium text-gray-600 hover:bg-gray-50">
        Cancel
      </a>
      <button (click)="onSubmit()" [disabled]="loading" class="inline-flex items-center gap-2 rounded-lg bg-indigo-600 px-5 py-2.5 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 disabled:opacity-50">
        @if (loading) {
          <div class="h-4 w-4 animate-spin rounded-full border-2 border-white border-t-transparent"></div>
        }
        {{ isEdit ? 'Update' : 'Create' }} Sponsor
      </button>
    </div>
  </div>
</div>
