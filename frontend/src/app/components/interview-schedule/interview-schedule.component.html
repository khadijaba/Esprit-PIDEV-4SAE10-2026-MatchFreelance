<div class="rounded-lg border border-slate-100 bg-slate-50 p-4">
  <div class="mb-3 flex items-center justify-between">
    <h4 class="text-xs font-medium text-slate-600">Interviews</h4>
    @if (!showForm) {
      <button
        (click)="openForm()"
        class="rounded-md bg-teal-600 px-2 py-1 text-xs font-medium text-white hover:bg-teal-700">
        Schedule
      </button>
    }
  </div>

  @if (showForm) {
    <div class="mb-3 rounded-md border border-slate-200 bg-white p-3">
      <input
        type="datetime-local"
        [(ngModel)]="formModel.scheduledAt"
        class="mb-2 w-full rounded border border-slate-300 px-2 py-1.5 text-sm" />
      <textarea
        [(ngModel)]="formModel.notes"
        placeholder="Notes (optional)"
        rows="2"
        class="mb-2 w-full rounded border border-slate-300 px-2 py-1.5 text-sm"></textarea>
      <div class="flex gap-2">
        <button (click)="scheduleInterview()" class="rounded bg-teal-600 px-2 py-1 text-xs text-white hover:bg-teal-700">
          Schedule
        </button>
        <button (click)="closeForm()" class="rounded border border-slate-300 px-2 py-1 text-xs text-slate-600 hover:bg-slate-100">
          Cancel
        </button>
      </div>
    </div>
  }

  @if (loading) {
    <div class="flex justify-center py-4">
      <div class="h-4 w-4 animate-spin rounded-full border-2 border-teal-200 border-t-teal-600"></div>
    </div>
  } @else if (interviews.length === 0) {
    <p class="text-xs text-slate-500">No interviews scheduled.</p>
  } @else {
    <div class="space-y-2">
      @for (i of interviews; track i.id) {
        <div class="flex items-center justify-between rounded border border-slate-200 bg-white px-3 py-2">
          <div>
            <p class="text-sm font-medium text-slate-800">{{ i.scheduledAt | date: 'medium' }}</p>
            <span class="inline-flex rounded-full px-2 py-0.5 text-xs font-medium" [class]="statusClass(i.status)">
              {{ i.status.replace('_', ' ') }}
            </span>
          </div>
          <div class="flex items-center gap-2">
            @if (i.status === 'SCHEDULED') {
              <button (click)="updateStatus(i, 'COMPLETED')" class="rounded border border-emerald-300 px-1.5 py-0.5 text-xs text-emerald-700 hover:bg-emerald-50">
                Done
              </button>
              <button (click)="updateStatus(i, 'CANCELLED')" class="rounded border border-red-300 px-1.5 py-0.5 text-xs text-red-600 hover:bg-red-50">
                Cancel
              </button>
            }
            <button (click)="deleteInterview(i)" class="rounded border border-slate-300 px-1.5 py-0.5 text-xs text-slate-600 hover:bg-slate-100">
              Remove
            </button>
          </div>
        </div>
      }
    </div>
  }
</div>
