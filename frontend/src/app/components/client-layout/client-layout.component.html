<div class="flex min-h-screen flex-col bg-slate-50">
  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white shadow-sm">
    <div class="mx-auto flex h-16 max-w-7xl items-center justify-between px-4 sm:px-6 lg:px-8">
      <a routerLink="/client" class="flex items-center gap-2">
        <div class="flex h-9 w-9 items-center justify-center rounded-lg bg-teal-600 text-white">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
        </div>
        <span class="text-xl font-bold text-slate-900">Client Dashboard</span>
      </a>
      <nav class="flex items-center gap-6">
        <a routerLink="dashboard" routerLinkActive="text-teal-600"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          My Projects
        </a>
        <a routerLink="projects/new" routerLinkActive="text-teal-600"
          class="text-sm font-medium text-slate-600 transition hover:text-slate-900">
          New Project
        </a>
      </nav>

      <div class="flex items-center gap-4">
        @if (auth.currentUser(); as user) {
        <div class="flex items-center gap-3 border-l border-slate-200 pl-4">
          <div class="text-right hidden sm:block">
            <div class="text-sm font-medium text-slate-900">{{ user.name }}</div>
            <button (click)="auth.loginAs('FREELANCER')"
              class="text-xs text-teal-600 hover:text-teal-800 hover:underline">
              Back to Freelancer
            </button>
          </div>
          <img [src]="user.avatarUrl" alt="" class="h-8 w-8 rounded-full bg-slate-100 ring-2 ring-white">
          <button (click)="auth.logout()" class="text-sm text-slate-500 hover:text-red-600" title="Logout">
            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
            </svg>
          </button>
        </div>
        }
      </div>
    </div>
  </header>

  <main class="flex-1 p-6">
    <router-outlet />
  </main>
</div>
