<div class="mx-auto max-w-2xl px-4 py-8 print:py-4">
  <div class="mb-6 no-print">
    <a routerLink="/formations" class="text-sm font-semibold text-slate-600 hover:text-teal-600">← Retour aux formations</a>
  </div>

  @if (loading) {
    <div class="flex justify-center py-20">
      <div class="h-10 w-10 animate-spin rounded-full border-4 border-amber-200 border-t-amber-600"></div>
    </div>
  }

  @if (error) {
    <div class="rounded-xl border border-red-200 bg-red-50 p-6 text-center">
      <p class="text-red-800">Certificat introuvable.</p>
      @if (certificatIdFromRoute != null) {
        <p class="mt-2 text-sm text-slate-600">Vous pouvez tenter d'ouvrir le PDF directement :</p>
        <button type="button" (click)="openPdfById(certificatIdFromRoute)" class="mt-3 rounded-lg bg-amber-600 px-4 py-2 text-sm font-medium text-white hover:bg-amber-700">
          Ouvrir en PDF
        </button>
      }
      <a routerLink="/formations" class="mt-4 inline-block text-sm font-medium text-red-600 hover:underline">Retour aux formations</a>
    </div>
  }

  @if (certificat && !loading) {
    <app-certificat-display [certificat]="certificat" [showVerify]="true" />

    <div class="mt-6 flex flex-wrap justify-center gap-3 no-print">
      <button type="button" (click)="openPdf()" class="rounded-xl bg-amber-600 px-6 py-3 text-sm font-semibold text-white hover:bg-amber-700">
        Voir en PDF
      </button>
      <button type="button" (click)="print()" class="rounded-xl bg-slate-700 px-6 py-3 text-sm font-semibold text-white hover:bg-slate-800">
        Imprimer
      </button>
      <a routerLink="/formations" class="rounded-xl border border-slate-300 px-6 py-3 text-sm font-medium text-slate-700 hover:bg-slate-50">
        Retour aux formations
      </a>
    </div>
  }
</div>

<style>
  @media print {
    .no-print { display: none !important; }
  }
</style>
