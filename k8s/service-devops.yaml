apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: devops
  labels:
    app: user-service
    component: backend
    environment: devops
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8082"
    prometheus.io/path: "/actuator/prometheus"
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
  - name: http
    port: 8082
    targetPort: 8082
    protocol: TCP
  sessionAffinity: None
