# This is a template file for Kubernetes secrets
# DO NOT commit actual secrets to version control
# Use this template to create actual secrets in your cluster

apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: microservices
  labels:
    app: user-service
    component: secrets
type: Opaque
stringData:
  # Database Configuration
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service:3306/userdb"
  SPRING_DATASOURCE_USERNAME: "userservice"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_ACTUAL_PASSWORD"
  
  # JWT Configuration
  JWT_SECRET: "REPLACE_WITH_ACTUAL_JWT_SECRET_KEY"
  
  # Email Configuration
  SPRING_MAIL_USERNAME: "REPLACE_WITH_EMAIL_USERNAME"
  SPRING_MAIL_PASSWORD: "REPLACE_WITH_EMAIL_PASSWORD"
  
  # SendGrid Configuration
  SENDGRID_API_KEY: "REPLACE_WITH_SENDGRID_API_KEY"
  
  # OAuth2 Configuration
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: "REPLACE_WITH_GOOGLE_CLIENT_ID"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: "REPLACE_WITH_GOOGLE_CLIENT_SECRET"

---
apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  namespace: microservices-staging
  labels:
    app: user-service
    component: secrets
    environment: staging
type: Opaque
stringData:
  # Database Configuration
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql-service-staging:3306/userdb_staging"
  SPRING_DATASOURCE_USERNAME: "userservice_staging"
  SPRING_DATASOURCE_PASSWORD: "REPLACE_WITH_STAGING_PASSWORD"
  
  # JWT Configuration
  JWT_SECRET: "REPLACE_WITH_STAGING_JWT_SECRET_KEY"
  
  # Email Configuration
  SPRING_MAIL_USERNAME: "REPLACE_WITH_STAGING_EMAIL_USERNAME"
  SPRING_MAIL_PASSWORD: "REPLACE_WITH_STAGING_EMAIL_PASSWORD"
  
  # SendGrid Configuration
  SENDGRID_API_KEY: "REPLACE_WITH_STAGING_SENDGRID_API_KEY"
  
  # OAuth2 Configuration
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: "REPLACE_WITH_STAGING_GOOGLE_CLIENT_ID"
  SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: "REPLACE_WITH_STAGING_GOOGLE_CLIENT_SECRET"

---
# Instructions for creating actual secrets:
# 
# 1. Copy this template to a secure location
# 2. Replace all "REPLACE_WITH_*" values with actual secrets
# 3. Apply to your cluster:
#    kubectl apply -f user-service-secrets.yaml
# 4. Verify secrets are created:
#    kubectl get secrets -n microservices
#    kubectl get secrets -n microservices-staging
# 
# For production environments, consider using:
# - External secret management (HashiCorp Vault, AWS Secrets Manager)
# - Sealed Secrets or External Secrets Operator
# - GitOps with encrypted secrets (SOPS, age)
#
# Example commands to create secrets from command line:
# kubectl create secret generic user-service-secrets \
#   --from-literal=SPRING_DATASOURCE_PASSWORD=your_password \
#   --from-literal=JWT_SECRET=your_jwt_secret \
#   -n microservices