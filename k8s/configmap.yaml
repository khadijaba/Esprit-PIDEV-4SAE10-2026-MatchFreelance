apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: microservices
  labels:
    app: user-service
    component: config
data:
  # Application configuration
  application.properties: |
    # Server Configuration
    server.port=9090
    management.server.port=8080
    
    # Spring Configuration
    spring.application.name=user-service
    spring.profiles.active=production
    
    # Database Configuration (will be overridden by secrets)
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.jpa.hibernate.ddl-auto=validate
    spring.jpa.show-sql=false
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
    
    # JWT Configuration
    jwt.expiration=86400000
    
    # Email Configuration
    spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    
    # Actuator Configuration
    management.endpoints.web.exposure.include=health,info,metrics,prometheus
    management.endpoint.health.show-details=when-authorized
    management.health.probes.enabled=true
    
    # Logging Configuration
    logging.level.esprit.tn.user=INFO
    logging.level.org.springframework.security=WARN
    logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
    
    # Eureka Configuration
    eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.lease-renewal-interval-in-seconds=30
    eureka.instance.lease-expiration-duration-in-seconds=90

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-service-config
  namespace: microservices-staging
  labels:
    app: user-service
    component: config
    environment: staging
data:
  # Application configuration for staging
  application.properties: |
    # Server Configuration
    server.port=9090
    management.server.port=8080
    
    # Spring Configuration
    spring.application.name=user-service
    spring.profiles.active=staging
    
    # Database Configuration (will be overridden by secrets)
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.show-sql=true
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
    
    # JWT Configuration
    jwt.expiration=86400000
    
    # Email Configuration
    spring.mail.host=smtp.gmail.com
    spring.mail.port=587
    spring.mail.properties.mail.smtp.auth=true
    spring.mail.properties.mail.smtp.starttls.enable=true
    
    # Actuator Configuration
    management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,configprops
    management.endpoint.health.show-details=always
    management.health.probes.enabled=true
    
    # Logging Configuration
    logging.level.esprit.tn.user=DEBUG
    logging.level.org.springframework.security=DEBUG
    logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
    
    # Eureka Configuration
    eureka.client.service-url.defaultZone=http://eureka-server-staging:8761/eureka/
    eureka.instance.prefer-ip-address=true
    eureka.instance.lease-renewal-interval-in-seconds=30
    eureka.instance.lease-expiration-duration-in-seconds=90