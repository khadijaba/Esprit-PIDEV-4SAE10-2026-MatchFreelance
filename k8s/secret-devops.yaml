apiVersion: v1
kind: Secret
metadata:
  name: user-service-secret
  namespace: devops
  labels:
    app: user-service
    component: secret
    environment: devops
type: Opaque
data:
  # Base64 encoded values
  # To encode: echo -n 'your-value' | base64
  # To decode: echo 'encoded-value' | base64 -d
  
  # Database credentials
  # Username: pidev (base64: cGlkZXY=)
  SPRING_DATASOURCE_USERNAME: cGlkZXY=
  
  # Password: pidev (base64: cGlkZXY=)
  SPRING_DATASOURCE_PASSWORD: cGlkZXY=
