# MySQL — use with: spring.profiles.active=mysql
# Docker Compose sets SPRING_DATASOURCE_* so we never hit localhost inside the container when Config Server is slow/absent.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/freelancing_interviews?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
