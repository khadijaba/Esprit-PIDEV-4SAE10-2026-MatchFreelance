server.port=8085
spring.application.name=interview-service

# Use MySQL (freelancing_interviews). Run the migration script once before first start.
spring.profiles.active=mysql

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:h2:mem:interviews
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Jitsi base URL for online meetings. Override with env JITSI_BASE_URL. Use self-hosted Jitsi (see docs/JITSI_SELF_HOSTED.md) to avoid "waiting for moderator".
jitsi.base-url=${JITSI_BASE_URL:https://meet.jit.si}

# Politique d'annulation : annulation autorisée jusqu'à X heures avant le début
interview.cancellation.allowed-hours-before=24
# Rappels : cron (every 15 min)
interview.reminders.cron=0 */15 * * * *

