name: 🧹 Cleanup - User Microservice

on:
  push:
    branches: [ main, develop, User ]
  schedule:
    # Run every Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

jobs:
  # ==========================================
  # Cleanup Old Artifacts
  # ==========================================
  cleanup-artifacts:
    name: 🧹 Cleanup Old Artifacts
    runs-on: ubuntu-latest
    
    steps:
      - name: 🧹 Delete Old Artifacts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get all artifacts
            const artifacts = await github.rest.actions.listArtifactsForRepo({
              owner,
              repo,
              per_page: 100
            });
            
            // Delete artifacts older than 30 days
            const thirtyDaysAgo = new Date();
            thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
            
            let deletedCount = 0;
            for (const artifact of artifacts.data.artifacts) {
              const createdAt = new Date(artifact.created_at);
              if (createdAt < thirtyDaysAgo) {
                await github.rest.actions.deleteArtifact({
                  owner,
                  repo,
                  artifact_id: artifact.id
                });
                console.log(`Deleted artifact: ${artifact.name}`);
                deletedCount++;
              }
            }
            
            console.log(`✅ Deleted ${deletedCount} old artifacts`);
            core.summary.addRaw(`## 🧹 Cleanup Summary\n\n- Deleted ${deletedCount} artifacts older than 30 days`);
            await core.summary.write();

  # ==========================================
  # Cleanup Old Docker Images
  # ==========================================
  cleanup-images:
    name: 🐳 Cleanup Old Docker Images
    runs-on: ubuntu-latest
    
    steps:
      - name: 🐳 Delete Old Container Images
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const packageName = 'user-service';
            
            try {
              // Get package versions
              const versions = await github.rest.packages.getAllPackageVersionsForPackageOwnedByOrg({
                package_type: 'container',
                package_name: packageName,
                org: owner,
                per_page: 100
              });
              
              // Keep last 10 versions, delete older ones
              const versionsToDelete = versions.data.slice(10);
              
              let deletedCount = 0;
              for (const version of versionsToDelete) {
                await github.rest.packages.deletePackageVersionForOrg({
                  package_type: 'container',
                  package_name: packageName,
                  org: owner,
                  package_version_id: version.id
                });
                console.log(`Deleted image version: ${version.name}`);
                deletedCount++;
              }
              
              console.log(`✅ Deleted ${deletedCount} old Docker images`);
            } catch (error) {
              console.log(`ℹ️ No old images to delete or insufficient permissions`);
            }

  # ==========================================
  # Cleanup Old Workflow Runs
  # ==========================================
  cleanup-workflow-runs:
    name: 🔄 Cleanup Old Workflow Runs
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔄 Delete Old Workflow Runs
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            
            // Get all workflows
            const workflows = await github.rest.actions.listRepoWorkflows({
              owner,
              repo
            });
            
            let totalDeleted = 0;
            
            for (const workflow of workflows.data.workflows) {
              // Get workflow runs older than 90 days
              const ninetyDaysAgo = new Date();
              ninetyDaysAgo.setDate(ninetyDaysAgo.getDate() - 90);
              
              const runs = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id: workflow.id,
                per_page: 100
              });
              
              for (const run of runs.data.workflow_runs) {
                const createdAt = new Date(run.created_at);
                if (createdAt < ninetyDaysAgo && run.status === 'completed') {
                  try {
                    await github.rest.actions.deleteWorkflowRun({
                      owner,
                      repo,
                      run_id: run.id
                    });
                    totalDeleted++;
                  } catch (error) {
                    // Ignore errors for runs that can't be deleted
                  }
                }
              }
            }
            
            console.log(`✅ Deleted ${totalDeleted} old workflow runs`);
            core.summary.addRaw(`## 🔄 Workflow Cleanup\n\n- Deleted ${totalDeleted} workflow runs older than 90 days`);
            await core.summary.write();

  # ==========================================
  # Summary Report
  # ==========================================
  cleanup-summary:
    name: 📊 Cleanup Summary
    runs-on: ubuntu-latest
    needs: [cleanup-artifacts, cleanup-images, cleanup-workflow-runs]
    if: always()
    
    steps:
      - name: 📊 Generate Summary
        run: |
          echo "## 🧹 Cleanup Completed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Artifacts cleanup: ${{ needs.cleanup-artifacts.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Docker images cleanup: ${{ needs.cleanup-images.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Workflow runs cleanup: ${{ needs.cleanup-workflow-runs.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Next cleanup**: $(date -d '+7 days' '+%Y-%m-%d')" >> $GITHUB_STEP_SUMMARY