name: 🔍 SonarCloud PR Analysis

# Workflow spécifique pour l'analyse des Pull Requests
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop
    paths:
      - 'User/**'
      - '.github/workflows/sonarcloud-pr.yml'

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  sonarcloud-pr:
    name: 🔍 Analyze Pull Request
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./User
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better blame information

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache SonarCloud Packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🧪 Run Tests with Coverage
        run: |
          mvn clean verify -B \
            -Dspring.profiles.active=test
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 🔍 SonarCloud PR Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar -B \
            -Dsonar.projectKey=aminebejaouiet_user-service \
            -Dsonar.organization=aminebejaouiet \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
            -Dsonar.pullrequest.branch=${{ github.head_ref }} \
            -Dsonar.pullrequest.base=${{ github.base_ref }} \
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: 📊 Generate PR Comment
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const projectKey = 'aminebejaouiet_user-service';
            const org = 'aminebejaouiet';
            
            const comment = `## 🔍 SonarCloud Analysis Results
            
            ### Pull Request #${prNumber}
            
            📊 **[View Detailed Analysis on SonarCloud](https://sonarcloud.io/project/pull_requests_list?id=${projectKey})**
            
            The code quality analysis for this PR has been completed. Please review:
            
            - 🐛 **Bugs**: Check for any new bugs introduced
            - 🔒 **Security**: Review security hotspots and vulnerabilities
            - 💡 **Code Smells**: Address maintainability issues
            - 📈 **Coverage**: Ensure adequate test coverage for new code
            
            ### Quality Gate
            
            The Quality Gate status will be updated shortly. Please ensure it passes before merging.
            
            ---
            
            💡 **Tips for Contributors:**
            - Fix critical and high severity issues before requesting review
            - Aim for >80% coverage on new code
            - Address security vulnerabilities immediately
            
            *Automated comment by SonarCloud PR Analysis workflow*`;
            
            github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

      - name: 📈 Upload Analysis Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pr-analysis-${{ github.event.pull_request.number }}
          path: |
            User/target/site/jacoco/
            User/target/surefire-reports/
          retention-days: 14
