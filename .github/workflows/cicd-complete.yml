name: 🚀 Complete CI/CD Pipeline - User Microservice

on:
  push:
    branches: [ main, develop, User ]
  pull_request:
    branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'
  SERVICE_NAME: 'user-service'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  # ==========================================
  # Stage 1: Code Quality & Tests
  # ==========================================
  quality-and-tests:
    name: 🔍 Quality & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./User
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: userdb_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    outputs:
      version: ${{ steps.version.outputs.version }}
      should-deploy: ${{ steps.deploy-check.outputs.should-deploy }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔧 Compile & Validate
        run: |
          mvn clean compile -B
          echo "✅ Compilation successful"

      - name: 🔍 Code Quality Analysis
        run: |
          # Basic code quality checks
          echo "🔍 Running code quality analysis..."
          mvn compile -B
          
          # Check for common issues
          echo "📊 Code Quality Summary:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Compilation: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- 📁 Source files: $(find src/main/java -name "*.java" | wc -l)" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 Test files: $(find src/test/java -name "*.java" | wc -l)" >> $GITHUB_STEP_SUMMARY

      - name: ⏳ Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P3306 -u root -prootpassword --silent; do
            echo 'Waiting for MySQL...'
            sleep 2
          done
          echo '✅ MySQL is ready!'

      - name: 🧪 Run Unit Tests
        run: |
          echo "🧪 Running unit tests..."
          mvn test -B \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/userdb_test \
            -Dspring.datasource.username=testuser \
            -Dspring.datasource.password=testpass
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📊 Test Results Analysis
        if: always()
        run: |
          echo "## 🧪 Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -d "target/surefire-reports" ]; then
            TOTAL_TESTS=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "tests=" {} \; | sed 's/.*tests="\([0-9]*\)".*/\1/' | awk '{sum += $1} END {print sum}')
            FAILED_TESTS=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "failures=" {} \; | sed 's/.*failures="\([0-9]*\)".*/\1/' | awk '{sum += $1} END {print sum}')
            ERRORS=$(find target/surefire-reports -name "TEST-*.xml" -exec grep -h "errors=" {} \; | sed 's/.*errors="\([0-9]*\)".*/\1/' | awk '{sum += $1} END {print sum}')
            
            echo "📊 **Total Tests**: ${TOTAL_TESTS:-0}" >> $GITHUB_STEP_SUMMARY
            echo "✅ **Passed**: $((${TOTAL_TESTS:-0} - ${FAILED_TESTS:-0} - ${ERRORS:-0}))" >> $GITHUB_STEP_SUMMARY
            echo "❌ **Failed**: ${FAILED_TESTS:-0}" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ **Errors**: ${ERRORS:-0}" >> $GITHUB_STEP_SUMMARY
            
            if [ "${FAILED_TESTS:-0}" -eq 0 ] && [ "${ERRORS:-0}" -eq 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "🎉 **All tests passed successfully!**" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ No test results found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 📁 Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            User/target/surefire-reports/
          retention-days: 7

      - name: 🏷️ Generate Version
        id: version
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            VERSION="1.0.${{ github.run_number }}"
          elif [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            VERSION="1.0.${{ github.run_number }}-dev"
          else
            VERSION="1.0.${{ github.run_number }}-${{ github.ref_name }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "🏷️ Version: $VERSION" >> $GITHUB_STEP_SUMMARY

      - name: 🚀 Check Deployment Conditions
        id: deploy-check
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "should-deploy=production" >> $GITHUB_OUTPUT
            echo "🚀 Will deploy to production" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            echo "should-deploy=staging" >> $GITHUB_OUTPUT
            echo "🧪 Will deploy to staging" >> $GITHUB_STEP_SUMMARY
          else
            echo "should-deploy=none" >> $GITHUB_OUTPUT
            echo "⏸️ No deployment (branch: ${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================
  # Stage 2: Build & Package
  # ==========================================
  build-and-package:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [quality-and-tests]
    if: success()
    defaults:
      run:
        working-directory: ./User
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Debug: List Repository Structure
        run: |
          echo "=== Repository Root ==="
          ls -la
          echo ""
          echo "=== User Directory ==="
          ls -la User/ || echo "User directory not found"
          echo ""
          echo "=== Looking for Dockerfile ==="
          find . -name "Dockerfile" -type f

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build Application
        run: |
          echo "🏗️ Building application..."
          mvn clean package -B \
            -DskipTests=true \
            -Dmaven.javadoc.skip=true \
            -Dversion=${{ needs.quality-and-tests.outputs.version }}
          
          echo "📦 Build completed successfully" >> $GITHUB_STEP_SUMMARY
          ls -la target/*.jar >> $GITHUB_STEP_SUMMARY

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar-${{ needs.quality-and-tests.outputs.version }}
          path: User/target/*.jar
          retention-days: 30

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ needs.quality-and-tests.outputs.version }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./User
          file: ./User/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: 📊 Build Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 **JAR**: Built successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 **Docker**: ${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **Version**: ${{ needs.quality-and-tests.outputs.version }}" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Stage 3: Security Scan (Optional)
  # ==========================================
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: [build-and-package]
    if: success() && github.event_name != 'pull_request'
    continue-on-error: true
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build-and-package.outputs.image-tag }}
          format: 'table'
          exit-code: '0'

      - name: 📊 Security Summary
        run: |
          echo "## 🛡️ Security Scan" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Container security scan completed" >> $GITHUB_STEP_SUMMARY
          echo "- 🐳 Image: ${{ needs.build-and-package.outputs.image-tag }}" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Stage 4: Deploy to Staging
  # ==========================================
  deploy-staging:
    name: 🧪 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [quality-and-tests, build-and-package]
    if: needs.quality-and-tests.outputs.should-deploy == 'staging'
    environment:
      name: staging
      url: https://user-service-staging.yourdomain.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "🧪 Deploying to Staging Environment"
          echo "📦 Version: ${{ needs.quality-and-tests.outputs.version }}"
          echo "🐳 Image: ${{ needs.build-and-package.outputs.image-tag }}"
          
          # Simulation du déploiement
          echo "✅ Deployment simulation completed"
          
          # Dans un vrai environnement, vous utiliseriez:
          # kubectl set image deployment/user-service user-service=${{ needs.build-and-package.outputs.image-tag }}
          # ou
          # helm upgrade user-service ./helm/user-service --set image.tag=${{ needs.quality-and-tests.outputs.version }}

      - name: 🧪 Staging Health Check
        run: |
          echo "🏥 Running health checks..."
          # Simulation des health checks
          sleep 5
          echo "✅ Health checks passed"

      - name: 📊 Staging Deployment Summary
        run: |
          echo "## 🧪 Staging Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Status**: Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **Version**: ${{ needs.quality-and-tests.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 **URL**: https://user-service-staging.yourdomain.com" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

  # ==========================================
  # Stage 5: Deploy to Production
  # ==========================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: [quality-and-tests, build-and-package, security-scan]
    if: needs.quality-and-tests.outputs.should-deploy == 'production'
    environment:
      name: production
      url: https://user-service.yourdomain.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🌟 Deploy to Production
        run: |
          echo "🌟 Deploying to Production Environment"
          echo "📦 Version: ${{ needs.quality-and-tests.outputs.version }}"
          echo "🐳 Image: ${{ needs.build-and-package.outputs.image-tag }}"
          
          # Simulation du déploiement
          echo "✅ Production deployment simulation completed"

      - name: 🏥 Production Health Check
        run: |
          echo "🏥 Running production health checks..."
          # Simulation des health checks
          sleep 10
          echo "✅ Production health checks passed"

      - name: 📊 Production Deployment Summary
        run: |
          echo "## 🌟 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Status**: Deployed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **Version**: ${{ needs.quality-and-tests.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 **URL**: https://user-service.yourdomain.com" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ **Deployed at**: $(date)" >> $GITHUB_STEP_SUMMARY

      - name: 📢 Notify Success
        run: |
          echo "🎉 Production deployment completed successfully!"
          echo "🚀 User Service v${{ needs.quality-and-tests.outputs.version }} is now live!"

  # ==========================================
  # Stage 6: Post-Deployment
  # ==========================================
  post-deployment:
    name: 📊 Post-Deployment
    runs-on: ubuntu-latest
    needs: [quality-and-tests, deploy-staging, deploy-production]
    if: always() && (needs.deploy-staging.result == 'success' || needs.deploy-production.result == 'success')
    
    steps:
      - name: 📊 Generate Deployment Report
        run: |
          echo "## 🚀 Deployment Report" > deployment-report.md
          echo "" >> deployment-report.md
          echo "**Pipeline Run**: #${{ github.run_number }}" >> deployment-report.md
          echo "**Version**: ${{ needs.quality-and-tests.outputs.version }}" >> deployment-report.md
          echo "**Branch**: ${{ github.ref_name }}" >> deployment-report.md
          echo "**Commit**: ${{ github.sha }}" >> deployment-report.md
          echo "**Triggered by**: ${{ github.actor }}" >> deployment-report.md
          echo "**Date**: $(date)" >> deployment-report.md
          echo "" >> deployment-report.md
          
          if [ "${{ needs.deploy-staging.result }}" = "success" ]; then
            echo "✅ **Staging**: Deployed successfully" >> deployment-report.md
          fi
          
          if [ "${{ needs.deploy-production.result }}" = "success" ]; then
            echo "✅ **Production**: Deployed successfully" >> deployment-report.md
          fi

      - name: 📁 Upload Deployment Report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report-${{ github.run_number }}
          path: deployment-report.md
          retention-days: 90

      - name: 🎯 Pipeline Summary
        run: |
          echo "## 🎯 Pipeline Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🏷️ **Version**: ${{ needs.quality-and-tests.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🧪 **Tests**: Passed" >> $GITHUB_STEP_SUMMARY
          echo "- 🏗️ **Build**: Success" >> $GITHUB_STEP_SUMMARY
          echo "- 🚀 **Deployment**: ${{ needs.quality-and-tests.outputs.should-deploy }}" >> $GITHUB_STEP_SUMMARY
          echo "- ⏰ **Duration**: ${{ github.event.head_commit.timestamp }}" >> $GITHUB_STEP_SUMMARY