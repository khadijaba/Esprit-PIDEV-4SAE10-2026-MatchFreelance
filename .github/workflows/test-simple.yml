name: 🧪 Simple Tests - User Microservice

on:
  push:
  pull_request:

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'

jobs:
  # ==========================================
  # Job 1: Basic Tests
  # ==========================================
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./User
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: userdb_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: ⏳ Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P3306 -u root -prootpassword --silent; do
            echo 'Waiting for MySQL...'
            sleep 2
          done
          echo 'MySQL is ready!'

      - name: 🧪 Run Unit Tests
        run: |
          mvn test -B \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/userdb_test \
            -Dspring.datasource.username=testuser \
            -Dspring.datasource.password=testpass
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📊 Generate Coverage Report
        run: mvn jacoco:report

      - name: 📈 Upload Coverage Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: |
            User/target/site/jacoco/
          retention-days: 30

      - name: 📊 Coverage Summary
        run: |
          echo "## 📊 Test Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "target/site/jacoco/index.html" ]; then
            echo "✅ Coverage report generated successfully" >> $GITHUB_STEP_SUMMARY
            echo "📁 Coverage reports uploaded as artifacts" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Coverage report not found" >> $GITHUB_STEP_SUMMARY
          fi

  # ==========================================
  # Job 2: Build Check
  # ==========================================
  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: ./User
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build Application
        run: |
          mvn clean package -B \
            -DskipTests=true \
            -Dmaven.javadoc.skip=true

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: User/target/*.jar
          retention-days: 7

      - name: ✅ Build Summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Application built successfully" >> $GITHUB_STEP_SUMMARY
          echo "📦 JAR artifact uploaded" >> $GITHUB_STEP_SUMMARY
          ls -la target/*.jar >> $GITHUB_STEP_SUMMARY