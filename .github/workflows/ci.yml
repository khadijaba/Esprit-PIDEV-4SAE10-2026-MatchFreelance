name: 🚀 CI/CD Pipeline - User Microservice (DISABLED)

# Temporarily disabled - use test-simple.yml instead
on:
  workflow_dispatch:  # Manual trigger only
  # Uncomment below to enable automatic triggers
  # push:
  #   branches: [ main, develop, User ]
  # pull_request:
  #   branches: [ main, develop ]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx1024m'
  SERVICE_NAME: 'user-service'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  # ==========================================
  # Job 1: Code Quality & Security Analysis
  # ==========================================
  code-quality:
    name: 🔍 Code Quality & Security
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./User
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for better analysis

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: 🔧 Compile Code
        run: mvn clean compile -B

      - name: 🔍 Run SpotBugs Analysis
        run: |
          mvn com.github.spotbugs:spotbugs-maven-plugin:4.8.2.0:check \
            -Dspotbugs.effort=Max \
            -Dspotbugs.threshold=Low \
            -Dspotbugs.failOnError=false

      - name: 🛡️ Run OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:9.0.7:check \
            -DfailBuildOnCVSS=7 \
            -DsuppressionsLocation=owasp-suppressions.xml || true

      - name: 📊 Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            User/target/spotbugsXml.xml
            User/target/dependency-check-report.html
          retention-days: 30

  # ==========================================
  # Job 2: Unit Tests & Coverage
  # ==========================================
  test:
    name: 🧪 Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./User
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: userdb_test
          MYSQL_USER: testuser
          MYSQL_PASSWORD: testpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 📦 Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: ⏳ Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P3306 -u root -prootpassword --silent; do
            echo 'Waiting for MySQL...'
            sleep 2
          done
          echo 'MySQL is ready!'

      - name: 🧪 Run Unit Tests
        run: |
          mvn test -B \
            -Dspring.profiles.active=test \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/userdb_test \
            -Dspring.datasource.username=testuser \
            -Dspring.datasource.password=testpass
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: 📊 Generate Coverage Report
        run: mvn jacoco:report

      - name: 📈 Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./User/target/site/jacoco/jacoco.xml
          flags: unittests
          name: user-service-coverage
          fail_ci_if_error: false

      - name: 💾 Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            User/target/surefire-reports/
            User/target/site/jacoco/
          retention-days: 30

      - name: 📊 Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: 🧪 Test Results
          path: User/target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

  # ==========================================
  # Job 3: Integration Tests
  # ==========================================
  integration-test:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: [test]
    defaults:
      run:
        working-directory: ./User
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: userdb_integration
          MYSQL_USER: integrationuser
          MYSQL_PASSWORD: integrationpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: ⏳ Wait for MySQL
        run: |
          until mysqladmin ping -h"127.0.0.1" -P3306 -u root -prootpassword --silent; do
            echo 'Waiting for MySQL...'
            sleep 2
          done

      - name: 🔗 Run Integration Tests
        run: |
          mvn verify -B \
            -Dspring.profiles.active=integration \
            -Dspring.datasource.url=jdbc:mysql://localhost:3306/userdb_integration \
            -Dspring.datasource.username=integrationuser \
            -Dspring.datasource.password=integrationpass \
            -Dtest=**/*IntegrationTest
        env:
          SPRING_PROFILES_ACTIVE: integration

  # ==========================================
  # Job 4: Build & Package
  # ==========================================
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-latest
    needs: [code-quality, test]
    defaults:
      run:
        working-directory: ./User
    
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build Application
        run: |
          mvn clean package -B \
            -DskipTests=true \
            -Dmaven.javadoc.skip=true

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: user-service-jar
          path: User/target/*.jar
          retention-days: 30

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🐳 Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./User
          file: ./User/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

  # ==========================================
  # Job 5: Security Scan
  # ==========================================
  security-scan:
    name: 🛡️ Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🔍 Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.build.outputs.image-tag }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: 📊 Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==========================================
  # Job 6: Deploy to Staging
  # ==========================================
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build, integration-test]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    environment:
      name: staging
      url: https://user-service-staging.yourdomain.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Staging
        run: |
          echo "🚀 Deploying User Service to Staging Environment"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Digest: ${{ needs.build.outputs.image-digest }}"
          # Add your staging deployment commands here
          # Example: kubectl, docker-compose, etc.

  # ==========================================
  # Job 7: Deploy to Production
  # ==========================================
  deploy-production:
    name: 🌟 Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration-test, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://user-service.yourdomain.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🌟 Deploy to Production
        run: |
          echo "🌟 Deploying User Service to Production Environment"
          echo "Image: ${{ needs.build.outputs.image-tag }}"
          echo "Digest: ${{ needs.build.outputs.image-digest }}"
          # Add your production deployment commands here
          # Example: kubectl, helm, etc.

      - name: 📢 Notify Deployment Success
        if: success()
        run: |
          echo "✅ User Service successfully deployed to production!"
          # Add notification logic (Slack, Teams, etc.)

  # ==========================================
  # Job 8: Cleanup
  # ==========================================
  cleanup:
    name: 🧹 Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-staging, deploy-production]
    if: always()
    
    steps:
      - name: 🧹 Cleanup Old Artifacts
        run: |
          echo "🧹 Cleaning up old artifacts and images"
          # Add cleanup logic for old Docker images, artifacts, etc.