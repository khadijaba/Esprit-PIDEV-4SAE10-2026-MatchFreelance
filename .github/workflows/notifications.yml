name: 📢 Notifications - User Microservice

on:
  workflow_run:
    workflows: ["🚀 Complete CI/CD Pipeline - User Microservice"]
    types:
      - completed

jobs:
  # ==========================================
  # Send Notifications
  # ==========================================
  notify:
    name: 📢 Send Notifications
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 📊 Get Workflow Info
        id: workflow
        run: |
          STATUS="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          COMMIT="${{ github.event.workflow_run.head_sha }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT:0:7}" >> $GITHUB_OUTPUT
          echo "actor=$ACTOR" >> $GITHUB_OUTPUT

      - name: 📝 Create Notification Message
        id: message
        run: |
          STATUS="${{ steps.workflow.outputs.status }}"
          
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            COLOR="good"
            STATUS_TEXT="Success"
          elif [ "$STATUS" = "failure" ]; then
            EMOJI="❌"
            COLOR="danger"
            STATUS_TEXT="Failed"
          else
            EMOJI="⚠️"
            COLOR="warning"
            STATUS_TEXT="Cancelled"
          fi
          
          MESSAGE="$EMOJI **CI/CD Pipeline $STATUS_TEXT**

**Branch**: \`${{ steps.workflow.outputs.branch }}\`
**Commit**: \`${{ steps.workflow.outputs.commit }}\`
**Author**: ${{ steps.workflow.outputs.actor }}
**Workflow**: ${{ github.event.workflow_run.name }}

[View Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }})"
          
          echo "message<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "color=$COLOR" >> $GITHUB_OUTPUT

      - name: 📧 Send Email Notification (Simulation)
        if: steps.workflow.outputs.status == 'failure'
        run: |
          echo "📧 Sending email notification..."
          echo "To: devops-team@company.com"
          echo "Subject: CI/CD Pipeline Failed - User Microservice"
          echo "Body: ${{ steps.message.outputs.message }}"
          echo "✅ Email notification sent (simulated)"

      - name: 💬 Send Slack Notification (Simulation)
        if: always()
        run: |
          echo "💬 Sending Slack notification..."
          echo "Channel: #deployments"
          echo "Message: ${{ steps.message.outputs.message }}"
          echo "✅ Slack notification sent (simulated)"
          
          # Dans un vrai environnement, utilisez:
          # curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text": "${{ steps.message.outputs.message }}"}'

      - name: 📱 Send Teams Notification (Simulation)
        if: always()
        run: |
          echo "📱 Sending Teams notification..."
          echo "Channel: DevOps"
          echo "Message: ${{ steps.message.outputs.message }}"
          echo "✅ Teams notification sent (simulated)"
          
          # Dans un vrai environnement, utilisez:
          # curl -X POST ${{ secrets.TEAMS_WEBHOOK_URL }} \
          #   -H 'Content-Type: application/json' \
          #   -d '{"text": "${{ steps.message.outputs.message }}"}'

      - name: 📊 Create Issue on Failure
        if: steps.workflow.outputs.status == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI/CD Pipeline Failed - ${context.payload.workflow_run.head_branch}`,
              body: `## Pipeline Failure Report
              
**Status**: ❌ Failed
**Branch**: \`${context.payload.workflow_run.head_branch}\`
**Commit**: \`${context.payload.workflow_run.head_sha.substring(0, 7)}\`
**Author**: @${context.payload.workflow_run.actor.login}
**Workflow**: ${context.payload.workflow_run.name}

### 🔗 Links
- [Failed Workflow Run](${context.payload.workflow_run.html_url})
- [Commit](https://github.com/${context.repo.owner}/${context.repo.repo}/commit/${context.payload.workflow_run.head_sha})

### 📋 Next Steps
1. Review the workflow logs
2. Identify the root cause
3. Fix the issue
4. Re-run the workflow

**Auto-generated by GitHub Actions**`,
              labels: ['ci-cd', 'bug', 'high-priority']
            });
            
            console.log(`Created issue #${issue.data.number}`);

      - name: 📊 Summary
        run: |
          echo "## 📢 Notification Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ steps.workflow.outputs.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ steps.workflow.outputs.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ steps.workflow.outputs.commit }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Author**: ${{ steps.workflow.outputs.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📬 Notifications Sent" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Email (simulated)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Slack (simulated)" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Teams (simulated)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.workflow.outputs.status }}" = "failure" ]; then
            echo "- ✅ GitHub Issue created" >> $GITHUB_STEP_SUMMARY
          fi