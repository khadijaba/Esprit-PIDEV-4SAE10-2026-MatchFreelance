name: 📦 Release - User Microservice

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

env:
  JAVA_VERSION: '17'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/user-service

jobs:
  # ==========================================
  # Create Release
  # ==========================================
  create-release:
    name: 📦 Create Release
    runs-on: ubuntu-latest
    
    outputs:
      version: ${{ steps.version.outputs.version }}
      upload_url: ${{ steps.create_release.outputs.upload_url }}
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🏷️ Get Version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Release Version: $VERSION"

      - name: 📝 Generate Changelog
        id: changelog
        run: |
          echo "## 🚀 What's New in v${{ steps.version.outputs.version }}" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            echo "### 📋 Changes since $LAST_TAG" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log $LAST_TAG..HEAD --pretty=format:"- %s (%h)" >> CHANGELOG.md
          else
            echo "### 📋 Initial Release" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" --max-count=20 >> CHANGELOG.md
          fi
          
          echo "" >> CHANGELOG.md
          echo "### 📊 Statistics" >> CHANGELOG.md
          echo "- **Tests**: 101 tests" >> CHANGELOG.md
          echo "- **Coverage**: 31%" >> CHANGELOG.md
          echo "- **Build**: Maven + Docker" >> CHANGELOG.md

      - name: 🎉 Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ github.event.inputs.prerelease || false }}

  # ==========================================
  # Build Release Artifacts
  # ==========================================
  build-artifacts:
    name: 🏗️ Build Release Artifacts
    runs-on: ubuntu-latest
    needs: [create-release]
    defaults:
      run:
        working-directory: ./User
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: 🏗️ Build Release
        run: |
          mvn clean package -B \
            -DskipTests=false \
            -Dversion=${{ needs.create-release.outputs.version }}

      - name: 📦 Upload JAR to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: User/target/user-0.0.1-SNAPSHOT.jar
          asset_name: user-service-${{ needs.create-release.outputs.version }}.jar
          asset_content_type: application/java-archive

      - name: 🐳 Build and Push Docker Image
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐳 Build and Push Release Image
        uses: docker/build-push-action@v5
        with:
          context: ./User
          file: ./User/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.create-release.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.version=${{ needs.create-release.outputs.version }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

  # ==========================================
  # Deploy Release
  # ==========================================
  deploy-release:
    name: 🚀 Deploy Release
    runs-on: ubuntu-latest
    needs: [create-release, build-artifacts]
    environment:
      name: production
      url: https://user-service.yourdomain.com
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🚀 Deploy to Production
        run: |
          echo "🚀 Deploying version ${{ needs.create-release.outputs.version }} to production"
          echo "🐳 Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.create-release.outputs.version }}"
          
          # Simulation du déploiement
          echo "✅ Deployment completed"

      - name: 📢 Announce Release
        run: |
          echo "🎉 Release v${{ needs.create-release.outputs.version }} deployed successfully!"
          echo "🌐 Available at: https://user-service.yourdomain.com"