# Analyse SonarQube : même stack que la CI (MySQL + Eureka + Config) puis `verify sonar:sonar`.
# Déclenchement manuel pour éviter les échecs si SONAR_TOKEN / SONAR_HOST_URL ne sont pas configurés.
name: Quality SonarQube

on:
  workflow_dispatch:

jobs:
  sonar-formation:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_ROOT_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure scripts executable
        run: chmod +x ./scripts/ci/wait-for-mysql.sh ./scripts/ci/start-stack.sh ./scripts/ci/stop-stack.sh ./backend/microservices/Formation/mvnw ./backend/EurekaServer/EurekaServer/mvnw

      - name: Wait for MySQL
        run: bash ./scripts/ci/wait-for-mysql.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start Eureka + Config Server
        run: bash ./scripts/ci/start-stack.sh

      - name: SonarQube scan (Formation)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/FormationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://localhost:8761/eureka
          SPRING_CONFIG_IMPORT: optional:configserver:http://localhost:8888
        run: >
          ./backend/microservices/Formation/mvnw -B
          -f backend/microservices/Formation/pom.xml
          clean verify sonar:sonar
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=formation-service
          -Dsonar.projectName=formation-service
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Stop Eureka / Config
        if: always()
        run: bash ./scripts/ci/stop-stack.sh

  sonar-evaluation:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_ROOT_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure scripts executable
        run: chmod +x ./scripts/ci/wait-for-mysql.sh ./scripts/ci/start-stack.sh ./scripts/ci/stop-stack.sh ./backend/microservices/Formation/mvnw ./backend/EurekaServer/EurekaServer/mvnw

      - name: Wait for MySQL
        run: bash ./scripts/ci/wait-for-mysql.sh

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start Eureka + Config Server
        run: bash ./scripts/ci/start-stack.sh

      - name: SonarQube scan (Evaluation)
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/EvaluationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://localhost:8761/eureka
          SPRING_CONFIG_IMPORT: optional:configserver:http://localhost:8888
        run: >
          ./backend/microservices/Formation/mvnw -B
          -f backend/microservices/Evaluation/pom.xml
          clean verify sonar:sonar
          -Dsonar.host.url=${SONAR_HOST_URL}
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.projectKey=evaluation-service
          -Dsonar.projectName=evaluation-service
          -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

      - name: Stop Eureka / Config
        if: always()
        run: bash ./scripts/ci/stop-stack.sh
