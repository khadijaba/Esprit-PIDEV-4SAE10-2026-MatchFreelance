name: Formation CI

on:
  push:
    paths:
      - "backend/microservices/Formation/**"
      - "scripts/ci/**"
      - ".github/workflows/formation-ci.yml"
  pull_request:
    paths:
      - "backend/microservices/Formation/**"
      - "scripts/ci/**"
      - ".github/workflows/formation-ci.yml"

jobs:
  build-test-formation:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=15

    env:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASSWORD: root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure scripts executable
        run: chmod +x ./scripts/ci/start-stack.sh ./scripts/ci/stop-stack.sh ./backend/microservices/Formation/mvnw ./backend/EurekaServer/EurekaServer/mvnw

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Start MySQL + Eureka + Config Server
        run: bash ./scripts/ci/start-stack.sh

      - name: Build + tests + JaCoCo (Formation) with MySQL + Eureka + Config
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/FormationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root
          EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://localhost:8761/eureka
          SPRING_CONFIG_IMPORT: optional:configserver:http://localhost:8888
        run: ./backend/microservices/Formation/mvnw -B -f backend/microservices/Formation/pom.xml clean verify

      - name: Stop Eureka / Config
        if: always()
        run: bash ./scripts/ci/stop-stack.sh

      - name: Upload test and coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: formation-test-reports
          path: |
            backend/microservices/Formation/target/surefire-reports/**
            backend/microservices/Formation/target/site/jacoco/**
