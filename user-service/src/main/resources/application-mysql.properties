# MySQL configuration - use with: spring.profiles.active=mysql (XAMPP default: root, no password)
spring.datasource.url=jdbc:mysql://localhost:3306/freelancing_users?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
