# Server Configuration
server.port=8085
spring.application.name=user-service

# Config Server
spring.config.import=optional:configserver:http://localhost:8888

# Eureka Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Active Profile
spring.profiles.active=mysql

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=your-secret-key-here-change-in-production-min-256-bits
jwt.expiration=86400000

# SendGrid Configuration
sendgrid.api.key=${SENDGRID_API_KEY:}
sendgrid.from.email=noreply@matchfreelance.com
sendgrid.from.name=MatchFreelance

# Logging
logging.level.root=INFO
logging.level.esprit.tn.user=DEBUG
logging.level.Service=DEBUG
