# Argo CD >= 2.6 : chart Helm officiel + fichier values depuis TON dépôt (évite "helm dependency update" et l'index > 5 Mo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "59.1.0"
      helm:
        releaseName: kube-prom
        valueFiles:
          - $repoValues/backend/microservices/k8s/monitoring/helm-values-kube-prometheus.yaml
    - repoURL: https://github.com/khadijaba/Esprit-PIDEV-4SAE10-2026-MatchFreelance.git
      targetRevision: douja
      ref: repoValues
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    automated:
      prune: true
      selfHeal: true
