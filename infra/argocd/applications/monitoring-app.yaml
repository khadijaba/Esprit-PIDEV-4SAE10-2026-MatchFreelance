# Argo CD >= 2.6 : chart Helm officiel + fichier values depuis TON dépôt (évite "helm dependency update" et l'index > 5 Mo).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-timeout: 900s
  labels:
    app.kubernetes.io/name: kube-prometheus
    app.kubernetes.io/part-of: match-freelance
    app.kubernetes.io/managed-by: argocd
    team: khadijaba
    env: production
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "59.1.0"
      helm:
        releaseName: kube-prom
        valueFiles:
          - $repoValues/backend/microservices/k8s/monitoring/helm-values-kube-prometheus.yaml
    - repoURL: https://github.com/khadijaba/Esprit-PIDEV-4SAE10-2026-MatchFreelance.git
      targetRevision: douja
      ref: repoValues
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    automated:
      prune: true
      selfHeal: true
