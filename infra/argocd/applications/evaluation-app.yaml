apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: evaluation
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/khadijaba/Esprit-PIDEV-4SAE10-2026-MatchFreelance.git
    targetRevision: douja
    path: backend/microservices/Evaluation/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: evaluation
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    automated:
      prune: true
      selfHeal: true
