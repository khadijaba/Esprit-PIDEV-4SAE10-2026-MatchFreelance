# kubectl apply -n argocd -f mysql-app.yaml
# (après installation d'Argo CD et création du secret repo si dépôt privé)
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mysql
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-timeout: 900s
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/part-of: match-freelance
    app.kubernetes.io/managed-by: argocd
    team: khadijaba
    env: production
spec:
  project: default
  source:
    repoURL: https://github.com/khadijaba/Esprit-PIDEV-4SAE10-2026-MatchFreelance.git
    targetRevision: douja
    path: backend/microservices/k8s
    directory:
      include: mysql.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: mysql
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    automated:
      prune: true
      selfHeal: true
