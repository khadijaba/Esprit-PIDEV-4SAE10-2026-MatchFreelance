# SonarCloud Configuration for User Microservice
# ================================================

# Project identification
sonar.projectKey=aminepidevops123_user-service
sonar.organization=aminepidevops123
sonar.projectName=User Service
sonar.projectVersion=1.0.0

# Source and test directories
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# Coverage reports
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# Encoding
sonar.sourceEncoding=UTF-8

# Java version
sonar.java.source=17
sonar.java.target=17

# Exclusions - Files to exclude from analysis
sonar.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/entity/**,\
  **/exception/**,\
  **/*Application.java,\
  **/target/**,\
  **/node_modules/**,\
  **/*.xml

# Coverage exclusions - Files to exclude from coverage
sonar.coverage.exclusions=\
  **/config/**,\
  **/dto/**,\
  **/entity/**,\
  **/exception/**,\
  **/*Application.java,\
  **/test/**

# Duplication exclusions
sonar.cpd.exclusions=\
  **/dto/**,\
  **/entity/**

# Test exclusions
sonar.test.exclusions=\
  **/test/**,\
  **/*Test.java,\
  **/*Tests.java

# Issue exclusions - Suppress specific rules if needed
sonar.issue.ignore.multicriteria=e1,e2,e3,e4

# E1: Mot de passe temporaire pour développement (DataInitializer)
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/DataInitializer.java

# E2: CORS configuré de manière sécurisée (WebConfig)
sonar.issue.ignore.multicriteria.e2.ruleKey=java:S5122
sonar.issue.ignore.multicriteria.e2.resourceKey=**/WebConfig.java

# E3: DTO utilisé au lieu de l'entité (UserController)
sonar.issue.ignore.multicriteria.e3.ruleKey=java:S4684
sonar.issue.ignore.multicriteria.e3.resourceKey=**/UserController.java

# E4: Logging sécurisé avec ID (UserService)
sonar.issue.ignore.multicriteria.e4.ruleKey=java:S5145
sonar.issue.ignore.multicriteria.e4.resourceKey=**/UserService.java

# Quality Gate
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# Analysis parameters
sonar.scm.provider=git
sonar.links.homepage=https://github.com/your-org/your-repo
sonar.links.ci=https://github.com/your-org/your-repo/actions
sonar.links.issue=https://github.com/your-org/your-repo/issues
sonar.links.scm=https://github.com/your-org/your-repo
