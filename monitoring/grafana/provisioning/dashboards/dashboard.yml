# Configuration automatique des dashboards Grafana

apiVersion: 1

providers:
  - name: 'User Service Dashboards'
    orgId: 1
    folder: 'User Microservice'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
