# candidature-service — Eureka + port (datasource: application-mysql.properties + SPRING_DATASOURCE_* in Docker)
spring:
  application:
    name: candidature-service
  cloud:
    discovery:
      enabled: true
    service-registry:
      auto-registration:
        enabled: true

server:
  port: 8083

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
