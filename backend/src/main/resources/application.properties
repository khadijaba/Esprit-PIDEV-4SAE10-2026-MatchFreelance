# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8081

# ===============================
# MYSQL DATABASE CONFIGURATION
# ===============================
# spring.datasource.url=jdbc:mysql://localhost:3306/freelancer_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
# spring.datasource.username=root
# spring.datasource.password=root
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# H2 DATABASE CONFIGURATION (for development)
# ===============================
spring.datasource.url=jdbc:h2:mem:freelancer_db
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===============================
# JPA / HIBERNATE CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ===============================
# LOGGING
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# SPRING AI - GROQ CONFIGURATION
# ===============================
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.temperature=0.7
spring.ai.openai.api-key=${GROQ_API_KEY:your-api-key-here}

# ===============================
# RETRY CONFIGURATION
# ===============================
spring.ai.retry.max-attempts=1
spring.ai.retry.on-http-codes=500,502,503