# ========== API GATEWAY ==========
spring.application.name=ApiGateway
server.port=8082

# Eureka : même URL que les microservices (pour toute l'équipe)
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Routes définies en Java (GatewayApplication) — 4 microservices
gateway.service.evaluation=EVALUATION
gateway.service.formation=FORMATION
gateway.service.skill=SKILL
gateway.service.project=PROJECT

# Upload de fichiers (CV) : augmenter la taille du buffer pour multipart
spring.codec.max-in-memory-size=10MB

# Optionnel : URL directes si Eureka non utilisé (décommenter pour dev sans Eureka)
# skill.service.uri=http://localhost:8083
# project.service.uri=http://localhost:8084

# Plus de page Whitelabel : erreurs en JSON
server.error.whitelabel.enabled=false
