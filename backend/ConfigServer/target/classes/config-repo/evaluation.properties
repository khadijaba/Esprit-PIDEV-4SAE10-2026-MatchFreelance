# Configuration pour le service EVALUATION
# Exemple
# eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# server.port=8083
# spring.datasource.url=jdbc:mysql://localhost:3306/EvaluationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#
# Génération via Python en premier si une URL non vide est définie (sinon Java + Ollama ci‑dessous).
# Laisser vide pour forcer la génération Java (recommandé avec Ollama local).
app.examen.python-generator-url=
#
# LLM — Ollama local (désactivez ou passez à false si vous n’utilisez pas Ollama)
app.examen.llm.enabled=true
app.examen.llm.use-by-default=true
app.examen.llm.base-url=http://127.0.0.1:11434/v1
app.examen.llm.api-key=
app.examen.llm.model=llama3.2:latest
app.examen.llm.reject-on-llm-failure=true
# Surcharge possible : variables d’environnement EXAMEN_LLM_* (prioritaires selon l’ordre Spring)
# Cloud OpenAI : app.examen.llm.base-url=https://api.openai.com/v1 + app.examen.llm.api-key=sk-...
# Python : pip install httpx
