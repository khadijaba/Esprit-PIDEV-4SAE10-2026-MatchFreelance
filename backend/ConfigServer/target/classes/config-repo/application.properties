# Configuration par défaut pour tous les microservices (Config Server — native classpath)
# Surchargée par {spring.application.name}.properties (ex. user.properties pour USER)

logging.level.root=INFO
logging.level.org.springframework.cloud=INFO

# Actuator : détails health (Eureka, DB, config client) — démo soutenance
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info
