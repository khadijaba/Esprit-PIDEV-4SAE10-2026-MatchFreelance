# ============================
# USER - Microservice Auth / Utilisateurs (Plateforme Freelancers & Project Matching)
# Nom Eureka = USER (pour lb://USER dans la Gateway)
# ============================
spring.application.name=USER
server.port=8085
# Préfixe pour correspondre aux routes Gateway /api/users -> service reçoit /users/...
server.servlet.context-path=/api

# ============================
# EUREKA CLIENT
# ============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

# ============================
# DATABASE MySQL
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/user?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# JWT
# ============================
jwt.secret=MatchFreelanceSecretKeyForJWTTokenGenerationMinimum32Characters
jwt.expiration-ms=86400000

# ============================
# ACTUATOR
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.jackson.serialization.indent-output=true
