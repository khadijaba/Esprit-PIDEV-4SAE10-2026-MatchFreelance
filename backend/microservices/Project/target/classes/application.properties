# Nom Eureka : doit correspondre à lb://PROJECT dans la Gateway
spring.application.name=PROJECT
server.port=8084

# Config Server (IntelliJ : localhost ; Docker : CONFIG_SERVER_HOST=config-server)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# base de données
spring.datasource.url=jdbc:mysql://localhost:3306/project?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true

# Sans cela, un ancien ENUM MySQL sans DRAFT provoque 500 à la sauvegarde brouillon.
app.db.ensure-status-varchar=true
