# Nom Eureka : doit correspondre à lb://INTERVIEW dans la Gateway
spring.application.name=INTERVIEW
server.port=8089

# Config Server (IntelliJ : localhost ; Docker : CONFIG_SERVER_HOST=config-server)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# Même clé que Config Server : ENUM MySQL incomplet sur interviews.status → erreur à l’insert.
app.db.ensure-interview-status-varchar=true
