apiVersion: apps/v1
kind: Deployment
metadata:
  name: interview-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: interview-service
  template:
    metadata:
      labels:
        app: interview-service
    spec:
      imagePullSecrets:
      - name: dockerhub-secret
      containers:
      - name: interview-service
        image: benhajdahmenahmed/interview:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8089
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "mysql"
        - name: SPRING_DATASOURCE_URL
          value: "jdbc:mysql://mysql-service:3306/freelancing_interviews?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
        - name: SPRING_DATASOURCE_USERNAME
          value: "root"
        - name: SPRING_DATASOURCE_PASSWORD
          value: "pidev"
        - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
          value: "http://eureka-service:8761/eureka/"
        - name: CONFIG_SERVER_HOST
          value: "config-server"
        resources:
          requests:
            cpu: "50m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: interview-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: interview-service
  ports:
  - port: 8089
    targetPort: 8089
