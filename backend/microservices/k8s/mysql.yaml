# Appliquer avant Formation / Evaluation : kubectl apply -f mysql.yaml
# Service DNS cluster : mysql.mysql.svc.cluster.local (namespace mysql) pour les apps en autre namespace.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: mysql
  labels:
    app: mysql
    env: production
    team: khadijaba
    version: "1.0"
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels:
    app: mysql
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
        env: production
        team: khadijaba
        version: "1.0"
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
          ports:
            - containerPort: 3306
