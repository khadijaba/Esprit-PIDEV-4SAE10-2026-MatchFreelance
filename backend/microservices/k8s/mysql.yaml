# Appliquer avant Formation / Evaluation : kubectl apply -f mysql.yaml
# Service DNS cluster : mysql.mysql.svc.cluster.local (namespace mysql) pour les apps en autre namespace.
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: mysql
  labels:
    app: mysql
    env: production
    team: khadijaba
    version: "1.0"
spec:
  ports:
    - port: 3306
      targetPort: 3306
  selector:
    app: mysql
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: mysql
  labels:
    app: mysql
    env: production
    team: khadijaba
    version: "1.0"
spec:
  selector:
    matchLabels:
      app: mysql
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: mysql
        env: production
        team: khadijaba
        version: "1.0"
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: "root"
          # VM / petit nœud : sans ça MySQL ~350Mi+ et le kubelet évince le pod (mémoire nœud saturée).
          args:
            - --innodb_buffer_pool_size=64M
            - --performance_schema=OFF
            - --max_connections=50
            - --table_open_cache=64
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          ports:
            - containerPort: 3306
