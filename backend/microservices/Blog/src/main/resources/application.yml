# Port : Render injecte PORT ; local 8078 (voir environment Angular si besoin)
server:
  port: ${PORT:8078}
  tomcat:
    max-http-form-post-size: 25MB
    max-swallow-size: 25MB

spring:
  application:
    name: BLOG
  # Render : SPRING_DATASOURCE_URL (+ USER / PASSWORD) ou DB_URL / DB_USER / DB_PASSWORD
  # Aiven : ajouter sslMode=REQUIRED dans l’URL JDBC (souvent déjà dans l’URL fournie)
  datasource:
    url: "${SPRING_DATASOURCE_URL:${DB_URL:jdbc:mysql://localhost:3306/blog?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}}"
    username: "${SPRING_DATASOURCE_USERNAME:${DB_USER:root}}"
    password: "${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: "${EUREKA_URL:http://${EUREKA_HOST:localhost}:${EUREKA_PORT:8761}/eureka/}"
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: "${spring.application.name}:${server.port}"
    prefer-ip-address: true
