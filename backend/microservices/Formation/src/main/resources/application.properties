# ============================
# APPLICATION
# ============================
spring.application.name=FORMATION
server.port=8096

# ============================
# CONFIG SERVER (OPTIONNEL)
# ?? en Docker -> remplacer localhost si utilis�
# ============================
spring.config.import=optional:configserver:http://localhost:8888


eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# ============================
# DATABASE MYSQL (DOCKER OK)
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/FormationDB?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
# ============================
# JPA / HIBERNATE
# ============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================
# ACTUATOR
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================
# JSON FORMAT DEV
# ============================
spring.jackson.serialization.indent-output=true

# ============================
# ERROR HANDLING
# ============================
