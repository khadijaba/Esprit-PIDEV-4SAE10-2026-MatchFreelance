# Nom Eureka : doit correspondre ‡ lb://SKILL dans la Gateway
spring.application.name=SKILL
server.port=8083

# Eureka : m?me URL pour toute l'?quipe (variable pour int?gration)
# Ex. -DEUREKA_URL=http://192.168.1.10:8761/eureka/
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# base de donn?es
spring.datasource.url=jdbc:mysql://localhost:3306/skill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100000MB
spring.servlet.multipart.max-request-size=100000MB

# File Upload Directory (chemin absolu recommand? pour ?viter erreurs Tomcat)
# Exemple Windows: C:/matchfreelance-uploads  ou  ${user.home}/matchfreelance-uploads
file.upload.dir=${user.home}/matchfreelance-uploads
