# Nom Eureka : doit correspondre à lb://SKILL dans la Gateway
spring.application.name=SKILL
# 8087 : évite le conflit avec EVALUATION (8083) dans validation
server.port=8087

# Config Server (IntelliJ : localhost ; Docker : CONFIG_SERVER_HOST=config-server)
spring.config.import=optional:configserver:http://${CONFIG_SERVER_HOST:localhost}:8888

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true

# base de données
spring.datasource.url=jdbc:mysql://localhost:3306/skill?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
management.endpoints.web.exposure.include=health,info,prometheus
management.prometheus.metrics.export.enabled=true

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=100000MB
spring.servlet.multipart.max-request-size=100000MB

file.upload.dir=${user.home}/matchfreelance-uploads
