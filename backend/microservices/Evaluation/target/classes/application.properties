# Config Server (optionnel)
spring.config.import=optional:configserver:http://localhost:8888

spring.application.name=EVALUATION
server.port=8083

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.instance-id=${spring.application.name}:${server.port}

spring.datasource.url=jdbc:mysql://localhost:3306/EvaluationDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.jackson.serialization.indent-output=true

# Gateway (API) — utilisé si app.certificat.qr-use-frontend=false pour le QR
app.public.base-url=http://localhost:8050
# Front Angular : pour le QR (scan téléphone). Mettre l'IP de votre PC sur le réseau local, ex. :
# app.frontend.base-url=http://192.168.1.15:4200
# + lancer : ng serve --host 0.0.0.0 --port 4200
app.frontend.base-url=http://localhost:4200
# true = QR ouvre le front /verify-certificat/... (recommandé). false = page HTML sur la Gateway.
app.certificat.qr-use-frontend=true

# Logo du certificat (chemin classpath dans src/main/resources)
# Exemple: src/main/resources/static/logo-matchfreelance.png
certificate.logo.path=/static/logo-matchfreelance.png

