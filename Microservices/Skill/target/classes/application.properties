spring.application.name=Skill
# 1. Port du microservice
server.port=8083



# 3. Config Eureka
# Eureka server
eureka.client.service-url.defaultZone=http://192.168.1.2:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
# 4. Base de donn�es
spring.datasource.url=jdbc:mysql://localhost:3306/skills?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# 5. JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 6. Config pour upload de fichiers
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
