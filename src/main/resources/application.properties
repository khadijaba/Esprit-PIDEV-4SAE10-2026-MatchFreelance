# Nom de l'application (OBLIGATOIRE pour Eureka)
spring.application.name=user

# Configuration de la source de configuration (Config Server)
spring.config.import=optional:configserver:http://localhost:8888

# Message de bienvenue (local fallback)
welcome.message=Welcome to the User Service (Local)

# Configuration du serveur
server.port=9090
# Multipart configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Base de donn�es
spring.datasource.url=jdbc:mysql://localhost:3306/UserDB?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
jwt.secret=${JWT_SECRET:your_jwt_secret_key_here}
jwt.expiration=86400000

# ========== CONFIGURATION SendGrid ==========
# OPTION 1 (RECOMMENDED): Utiliser une variable d'environnement (PLUS SECURISEE)
# Set environment variable: SENDGRID_API_KEY=your_api_key_here
# On Windows: setx SENDGRID_API_KEY "your_api_key_here"
# Puis redemarrer l'application

# OPTION 2: Utiliser les proprietes application (NON RECOMMANDE en production)
# Decommmentez la ligne ci-dessous et remplacez par votre API key
sendgrid.api.key=${SENDGRID_API_KEY:your_sendgrid_api_key_here}

# Sender configuration (must be verified in SendGrid dashboard)
# Go to: Settings > Sender Authentication > Single Sender Verification
# IMPORTANT: You must verify this email in your SendGrid dashboard before sending emails
sendgrid.from.email=aminebej2002@gmail.com
sendgrid.from.name=Amine Bejaoui

# Logging pour debug SendGrid
logging.level.Service.SendGridEmailService=DEBUG
logging.level.Config.SendGridConfig=DEBUG

# ========== FIN SendGrid =========

# ========== OAUTH2 GOOGLE LOGIN ==========
# REPLACE THESE WITH YOUR REAL CREDENTIALS FROM GOOGLE CLOUD CONSOLE
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your_google_client_id_here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your_google_client_secret_here}
spring.security.oauth2.client.registration.google.scope=email,profile

# Eureka Configuration
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8772/eureka/
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=true

# ========== ACTUATOR & MONITORING ==========
# Expose all actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.metrics.export.prometheus.enabled=true

