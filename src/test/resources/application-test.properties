# Test Database Configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA Configuration for Tests
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (for debugging)
spring.h2.console.enabled=true

# Disable Eureka for tests
eureka.client.enabled=false

# Disable SendGrid for tests
sendgrid.api.key=test-key
sendgrid.from.email=test@example.com
sendgrid.from.name=Test Team

# Logging Configuration
logging.level.org.springframework.web=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.Service=DEBUG

# Test specific configurations
spring.test.database.replace=none
spring.jpa.defer-datasource-initialization=true

# Security Configuration for Tests
spring.security.user.name=test
spring.security.user.password=test
spring.security.user.roles=USER

# JWT Configuration for Tests
jwt.secret=testSecretKeyForJWTTokenGenerationThatIsLongEnoughForHS512Algorithm
jwt.expiration=86400000

# Mail Configuration for Tests (disabled)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@example.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Actuator Configuration for Tests
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

# File Upload Configuration for Tests
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Test Profile Specific Settings
spring.profiles.active=test