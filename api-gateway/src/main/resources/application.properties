server.port=8081
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Routes to microservices via Eureka
spring.cloud.gateway.routes[0].id=project-service
spring.cloud.gateway.routes[0].uri=lb://project-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/projects,/api/projects/**

spring.cloud.gateway.routes[1].id=candidature-service
spring.cloud.gateway.routes[1].uri=lb://candidature-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/candidatures,/api/candidatures/**

spring.cloud.gateway.routes[2].id=contract-service
spring.cloud.gateway.routes[2].uri=lb://contract-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/contracts/**

spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/users,/api/users/**,/api/auth,/api/auth/**
